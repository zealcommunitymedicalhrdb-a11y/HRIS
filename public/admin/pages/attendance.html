<!-- Attendance Content -->
<div class="p-4 sm:p-8">
    <div class="bg-white rounded-lg shadow p-6 mb-6">
    <h3 class="text-lg font-bold text-gray-900 mb-4">Quick Check-in / Out</h3>
    <div class="flex flex-col gap-4 w-full max-w-2xl">
    <div class="flex flex-col sm:flex-row gap-4">
        <div class="relative flex-1">
            <input type="text" id="manualEmployeeId" placeholder="Waiting for scan..." 
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#003D7A] outline-none">
        </div>
        <button onclick="handleCheckIn()" class="bg-[#003D7A] text-white px-6 py-2 rounded-lg font-medium hover:bg-[#0052A3]">
            Submit
        </button>
    </div>
</div>
</div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <!-- Left Section - Live Check-in Status -->
        <div class="md:col-span-3 space-y-6">
            <!-- Live Check-in Status Card -->
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-lg font-bold text-gray-900">Live Check-in Status</h3>
                </div>

                <!-- Check-in Table -->
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead>
                            <tr class="border-b border-gray-200">
                                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-600 uppercase">STAFF MEMBER</th>
                                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-600 uppercase">CHECK-IN TIME</th>
                                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-600 uppercase">CHECK-OUT TIME</th>
                                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-600 uppercase">STATUS</th>
                                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-600 uppercase">HOURS TODAY</th>
                                <th class="text-left px-4 py-3 text-xs font-semibold text-gray-600 uppercase">ACTIONS</th>
                            </tr>
                        </thead>
                        <tbody id="attendanceTableBody">
    </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Right Section - Absence Tracking & Reports -->
        <div class="md:col-span-1 space-y-6">
            <!-- Absence Tracking -->
            <div class="bg-white rounded-lg shadow p-6">
                <h3 class="text-lg font-bold text-gray-900 mb-6">Absence Tracking</h3>
               <div id="absenceListContainer" class="space-y-4">
        </div>
            </div>
           
<div class="bg-white rounded-lg shadow p-6">
            <div class="flex flex-col gap-2 mb-4">
    <button onclick="loadAttendanceByDate()" 
        class="w-full border border-[#003D7A] text-[#003D7A] py-2 rounded-lg font-semibold hover:bg-gray-50 transition flex items-center justify-center gap-2">
        <i class="fas fa-folder-open"></i> Load Attendance
    </button>

    <select id="attendance-date" class="w-full px-4 py-2 border border-gray-300 rounded-lg">
        <option value="">Select a date with records...</option>
    </select>
        <button onclick="resetToLiveAttendance()" class="w-full text-xs text-gray-500 hover:text-red-600 transition flex items-center justify-center gap-1 mt-2"> <i class="fas fa-sync-alt"></i>Reset to Live</button>
</div>
</div>
        </div>
    </div>
</div>

<!-- Edit Time Modal -->
<div id="editTimeModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl p-6 max-w-md w-full mx-4">
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-lg font-bold text-gray-900">Edit Attendance Time</h3>
            <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600 text-xl">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="space-y-4">
            <!-- Staff Member Info -->
            <div>
                <p class="text-xs text-gray-600 uppercase font-semibold mb-2">Staff Member</p>
                <p class="text-gray-900 font-semibold text-lg" id="modalStaffName"></p>
            </div>

            <!-- Check-in Time -->
            <div>
                <label class="text-xs text-gray-600 uppercase font-semibold mb-2 block">Check-in Time</label>
                <div class="flex flex-col sm:flex-row gap-2">
                    <input type="time" id="checkInTime" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#003D7A]">
                    <input type="date" id="checkInDate" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#003D7A]">
                </div>
            </div>

            <!-- Check-out Time -->
            <div>
                <label class="text-xs text-gray-600 uppercase font-semibold mb-2 block">Check-out Time</label>
                <div class="flex flex-col sm:flex-row gap-2">
                    <input type="time" id="checkOutTime" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#003D7A]">
                    <input type="date" id="checkOutDate" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#003D7A]">
                </div>
            </div>

            <!-- Reason for Change -->
            <div>
                <label class="text-xs text-gray-600 uppercase font-semibold mb-2 block">Reason for Change</label>
                <select id="reasonSelect" class="w-full px-4 py-2 border border-gray-300 rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#003D7A]">
                    <option>Select a reason</option>
                    <option>Employee Request</option>
                    <option>System Error</option>
                    <option>Manual Correction</option>
                    <option>Emergency Leave</option>
                    <option>Other</option>
                </select>
            </div>

            <!-- Notes -->
            <div>
                <label class="text-xs text-gray-600 uppercase font-semibold mb-2 block">Additional Notes</label>
                <textarea id="notesTextarea" rows="3" placeholder="Add any notes about this change..." class="w-full px-4 py-2 border border-gray-300 rounded-lg text-gray-900 focus:outline-none focus:ring-2 focus:ring-[#003D7A] resize-none"></textarea>
            </div>

            <!-- Action Buttons -->
            <div class="flex flex-col sm:flex-row gap-3 pt-4 border-t border-gray-200">
                <button onclick="closeEditModal()" class="flex-1 border border-gray-300 text-gray-700 px-4 py-2 rounded-lg font-medium hover:bg-gray-50 transition">
                    Cancel
                </button>
                <button onclick="saveTimeChanges()" class="flex-1 bg-[#003D7A] text-white px-4 py-2 rounded-lg font-medium hover:bg-[#0052A3] transition">
                    Save Changes
                </button>
            </div>
        </div>
    </div>
</div>
