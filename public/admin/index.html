/* Styling for tabs containing validation errors */
.tab-btn.has-error {
    border-left-color: #EF4444 !important; /* Red-500 */
    color: #B91C1C !important; /* Red-700 */
    background-color: #FEF2F2 !important; /* Red-50 */
}

/* Standardized ID Card Styling */
.id-card-side {
    width: 3.375in !important;
    height: 5.125in !important;
    min-width: 3.375in !important;
    max-width: 3.375in !important;
    background-color: white !important;
    border-radius: 1.5rem; 
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    border: 1px solid #e5e7eb;
    box-sizing: border-box; 
}

/* Container adjustments */
.header-container {
    width: 100% !important;
    height: 148px !important; /* Standard h-32 */
    background-color: #003D7A !important;
    display: flex !important;
    align-items: flex-start !important; /* Anchors content to the top */
    padding: 10px 16px 0 16px !important; /* Reduced top padding to 10px */
    gap: 12px;
    box-sizing: border-box;
}

/* Logo placement */
.logo-wrapper {
    background-color: white;
    padding: 4px;
    border-radius: 6px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    margin-top: 4px; /* Pulls logo up slightly more */
    margin-bottom: 5px;
}

.logo-img {
    height: 36px;
    width: 36px;
    display: block;
    object-fit: contain;
}

/* Text placement */
.header-text-container {
    flex: 1;
    text-align: right;
    line-height: 1.0;
    margin-top: -10px; /* Pulls the entire text block up */
}

.foundation-name {
    font-size: 11px;
    font-weight: 900;
    color: #ffffff;
    text-transform: uppercase;
    letter-spacing: -0.05em;
    margin: 0;

}

.badge-subtitle {
    font-size: 7px;
    font-weight: 700;
    color: #bfdbfe;
    text-transform: uppercase;
    margin-top: -1px; /* Pulls subtitle tight to the name */
    margin-bottom: 0;
}



@media print {
    /* Hide everything by default using display: none instead of visibility */
    body > *:not(#id-badge-container) {
        display: none !important;
    }

    /* Ensure the container is shown and starts at the top */
    #id-badge-container {
        display: block !important;
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
    }

    .id-card-side {
        display: flex !important;
        margin: 0 auto 10px auto !important; /* Center and small gap */
        page-break-inside: avoid !important;
        break-inside: avoid !important;
        width: 3.375in !important;
        height: 5.125in !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
    }

    @page {
        size: auto;
        margin: 0.2in; /* Small margin to ensure content isn't clipped by printer */
    }
}

@keyframes bounce-in {
    0% { transform: translateX(100%); opacity: 0; }
    60% { transform: translateX(-10%); opacity: 1; }
    100% { transform: translateX(0); }
}
.animate-bounce-in {
    animation: bounce-in 0.5s ease-out forwards;
}

   <script>
const socket = io(window.location.origin, {
    transports: ["websocket"]
});

// --- SOCKET EVENTS ---
socket.on('connect', () => {
    console.log('✅ Admin connected to server:', socket.id);
    // Join user room for messaging
    const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser') || '{}');
    const userId = loggedInUser.employeeId || localStorage.getItem('employeeId') || null;
    if (userId) {
        socket.emit('join-user-room', userId);
        console.log('📡 Admin joined messaging room:', userId);
    }
});

socket.on('connect_error', (err) => {
    console.error("❌ Connection error:", err.message);
});

socket.on('new-notification', (notif) => {
    const localUser = JSON.parse(localStorage.getItem('loggedInUser') || '{}');
    const userRole = (localUser.role || '').toLowerCase();
    const userId = (localUser.employeeId || '').toUpperCase();

    if (notif.recipientRole?.toLowerCase() !== 'admin' && notif.recipientId?.toUpperCase() !== userId) {
        return;
    }

    console.log("🔥 REALTIME RECEIVED:", notif);
    playNotificationSound();
    showNotificationBanner(notif);
    addNotificationToUI(notif);
    updateBadge();
});

</script>
   
<script>
    

// --- HELPER FUNCTION TO UPDATE HEADER / SIDEBAR ---
function updateSidebarUserInfo(user) {
    const nameEl = document.getElementById('displayUserName');
    const roleEl = document.getElementById('displayUserRole');
    const initialEl = document.getElementById('displayUserInitials');
    const initialsTextEl = document.getElementById('displayUserInitialsText');
    const profilePicEl = document.getElementById('displayUserProfilePic');

    // Extract user name (try multiple possible field names)
    const fullName = user.fullName || user.name || 
                     (user.firstName && user.lastName ? `${user.firstName} ${user.lastName}` : '') || 
                     "Guest User";
    
    // Extract user position/role
    const position = user.position || user.role || "Staff";
    
    // Update name and role elements
    if (nameEl) nameEl.textContent = fullName;
    if (roleEl) roleEl.textContent = position;

    // Generate initials
    const initials = fullName && fullName !== "Guest User"
        ? fullName.split(' ').filter(n => n).map(n => n[0]).join('').toUpperCase().substring(0, 2)
        : "??";

    // Update profile picture or initials
    if (profilePicEl && user.profilePic) {
        profilePicEl.src = user.profilePic;
        profilePicEl.classList.remove('hidden');
        if (initialsTextEl) initialsTextEl.classList.add('hidden');
        if (initialEl) initialEl.classList.remove('bg-gradient-to-br', 'from-purple-400', 'to-purple-600');
    } else {
        if (profilePicEl) profilePicEl.classList.add('hidden');
        if (initialsTextEl) {
            initialsTextEl.textContent = initials;
            initialsTextEl.classList.remove('hidden');
        }
        if (initialEl) initialEl.classList.add('bg-gradient-to-br', 'from-purple-400', 'to-purple-600');
    }
}

// --- ON PAGE LOAD ---
// Load the user info from localStorage and update header/sidebar
document.addEventListener('DOMContentLoaded', () => {
    const savedUser = localStorage.getItem('loggedInUser') || localStorage.getItem('authUser');
    if (savedUser) {
        const user = JSON.parse(savedUser);
        updateSidebarUserInfo(user);
    }
});





// --- SOUND PRIMING FOR AUTOPLAY ---
document.addEventListener('click', enableSound, { once: true });
document.addEventListener('keydown', enableSound, { once: true });

function enableSound() {
    const sound = document.getElementById('notif-sound');
    if (!sound) return;
    sound.play().then(() => {
        sound.pause();
        sound.currentTime = 0;
        console.log("🔊 Sound unlocked!");
    }).catch(() => {});
}

// --- PLAY SOUND ---
function playNotificationSound() {
    const sound = document.getElementById('notif-sound');
    if (!sound) return;
    sound.currentTime = 0;
    sound.play().catch(() => {
        console.warn("🔇 Sound blocked (needs user interaction)");
    });
}

// --- SHOW BANNER ---
function showNotificationBanner(notif) {
    const container = document.getElementById('notif-banner-container');
    const banner = document.createElement('div');
    banner.className = "bg-white border-l-4 border-[#003D7A] shadow-2xl rounded-lg p-4 flex items-center gap-4 min-w-[300px] animate-bounce-in cursor-pointer";

    banner.onclick = () => {
        if (notif.url) window.location.href = notif.url;
        markAsRead(notif._id);
    };

    banner.innerHTML = `
        <div class="text-[#003D7A] text-xl"><i class="fas fa-bell"></i></div>
        <div>
            <p class="font-bold text-gray-800 text-sm">${notif.title}</p>
            <p class="text-xs text-gray-600">${notif.message}</p>
        </div>
    `;

    container.appendChild(banner);
    setTimeout(() => {
        banner.classList.add('opacity-0', 'transition-opacity', 'duration-500');
        setTimeout(() => banner.remove(), 500);
    }, 4000);
}

// --- UPDATE DROPDOWN BADGE ---
function updateBadge() {
    const badge = document.getElementById('notificationBadge');
    const countHeader = document.getElementById('notificationCount');
    if (!badge || !countHeader) return;

    let count = parseInt(countHeader.innerText) || 0;
    count++;
    badge.classList.remove('hidden');
    countHeader.innerText = `${count} new`;
}

// --- ADD NOTIFICATION TO DROPDOWN LIST ---
function addNotificationToUI(n) {
    const listContainer = document.getElementById('notificationsList');
    const badge = document.getElementById('notificationBadge');
    const countHeader = document.getElementById('notificationCount');
    if (!listContainer || !badge || !countHeader) return;

    // Remove placeholder if exists
    const emptyState = listContainer.querySelector('.text-gray-400');
    if (emptyState) listContainer.innerHTML = '';

    const newItem = document.createElement('div');
    newItem.className = "notification-item border-b border-gray-200 p-4 hover:bg-gray-50 cursor-pointer transition bg-blue-50";
    newItem.onclick = () => markAsRead(n._id);

    newItem.innerHTML = `

async function refreshNotifications() {
    try {
        const response = await fetch('/api/notifications/all?recipientRole=admin');
        const notifications = await response.json();

        const listContainer = document.getElementById('notificationsList');
        const badge = document.getElementById('notificationBadge');
        const countHeader = document.getElementById('notificationCount');
        if (!listContainer || !badge || !countHeader) return;

        const unreadNotifications = notifications.filter(n => !n.isRead);
        const unreadCount = unreadNotifications.length;

        if (unreadCount > 0) {
            badge.classList.remove('hidden');
            countHeader.innerText = `${unreadCount} new`;
        } else {
            badge.classList.add('hidden');
            countHeader.innerText = `0 new`;
        }

        if (notifications.length === 0) {
            listContainer.innerHTML = `
                <div class="p-8 text-center text-gray-400">
                    <i class="fas fa-bell-slash text-3xl mb-2"></i>
                    <p class="text-sm">No notifications yet</p>
                </div>
            `;
            return;
        }

        listContainer.innerHTML = notifications.map(n => `
            <div class="notification-item border-b border-gray-200 p-4 hover:bg-gray-50 cursor-pointer transition ${n.isRead ? 'bg-white' : 'bg-blue-50'}"
                 onclick="markAsRead('${n._id}')">
                <div class="flex gap-3">
                    <div class="flex-shrink-0">

// --- TIME AGO HELPER ---
function timeAgo(date) {
    const seconds = Math.floor((new Date() - new Date(date)) / 1000);
    if (seconds < 60) return 'Just now';
    if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
    if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
    return Math.floor(seconds / 86400) + 'd ago';
}

        function updatePayrollDateRange() {
            const monthInput = document.getElementById('payroll-month');
            const periodInput = document.getElementById('payroll-period');
            const startInput = document.getElementById('startDate');
            const endInput = document.getElementById('endDate');

            if (!monthInput || !periodInput || !startInput || !endInput) {
                console.log('[Payroll] update skipped: missing input elements');
                return;
            }

            const monthValue = monthInput.value;
            const periodValue = periodInput.value;

            if (!monthValue) {
                console.log('[Payroll] update skipped: no month selected');
                return;
            }

            if (periodValue === 'custom') {
                console.log('[Payroll] custom period selected; date fields remain manual');
                return;
            }

            const [year, month] = monthValue.split('-');
            if (!year || !month) {
                console.log('[Payroll] update skipped: invalid month format', monthValue);
                return;
            }

            const paddedMonth = month.padStart(2, '0');
            const monthIndex = Number(month) - 1;
            const lastDay = new Date(Number(year), monthIndex + 1, 0).getDate();
            const paddedLastDay = String(lastDay).padStart(2, '0');

            if (periodValue === '15th') {
                startInput.value = `${year}-${paddedMonth}-01`;
                endInput.value = `${year}-${paddedMonth}-15`;
            } else if (periodValue === '30th') {
                startInput.value = `${year}-${paddedMonth}-16`;
                endInput.value = `${year}-${paddedMonth}-${paddedLastDay}`;
            }

            console.log('[Payroll] auto-filled dates:', {
                month: monthValue,
                period: periodValue,
                start: startInput.value,
                end: endInput.value,
            });
        }

function updatePagination(data) {
    const info = document.getElementById('paginationInfo');
    const controls = document.getElementById('paginationControls');
    if (!info || !controls) return;

    // Use the exact keys returned by the backend
    const currentPage = data.page; 
    const totalPages = data.pages;
    const totalEmployees = data.total;
    
    // Constant limit used in backend
    const pageSize = 10; 
    
    // 1. Update the Summary Text
    const start = totalEmployees > 0 ? (currentPage - 1) * pageSize + 1 : 0;
    const end = Math.min(currentPage * pageSize, totalEmployees);

    info.innerText = totalEmployees > 0 
        ? `Showing ${start} to ${end} of ${totalEmployees} employees`
        : `Showing 0 employees`;

    // 2. Clear and Generate Buttons
    let html = '';

    // Previous Button
    html += `
        <button onclick="loadEmployees(${currentPage - 1})" 
            class="w-8 h-8 rounded border border-gray-300 text-gray-600 hover:bg-gray-100 transition disabled:opacity-50 disabled:cursor-not-allowed"
            ${currentPage <= 1 ? 'disabled' : ''}>
            <i class="fas fa-chevron-left"></i>
        </button>`;

    // Page Numbers (with simple logic to avoid huge button lists)
    for (let i = 1; i <= totalPages; i++) {
        const isActive = i === currentPage;
        const activeClass = isActive 
            ? 'bg-[#003D7A] text-white font-medium shadow-sm' 
            : 'border border-gray-300 text-gray-600 hover:bg-gray-100';
        
        html += `
            <button onclick="loadEmployees(${i})" 
                class="w-8 h-8 rounded transition ${activeClass}">
                ${i}
            </button>`;
    }

    // Next Button
    html += `
        <button onclick="loadEmployees(${currentPage + 1})" 
            class="w-8 h-8 rounded border border-gray-300 text-gray-600 hover:bg-gray-100 transition disabled:opacity-50 disabled:cursor-not-allowed"
            ${currentPage >= totalPages || totalPages === 0 ? 'disabled' : ''}>
            <i class="fas fa-chevron-right"></i>
        </button>`;

    controls.innerHTML = html;
}

async function approveLoanRequest(loanId) {
    if (!loanId || !confirm('Approve this loan request?')) return;

    try {
        const approvedAmountPrompt = prompt('Enter approved loan amount or leave blank to keep requested amount:');
        let approvedLoanAmount = null;

        if (approvedAmountPrompt !== null && approvedAmountPrompt.trim() !== '') {
            approvedLoanAmount = parseFloat(approvedAmountPrompt.replace(/,/g, ''));
            if (Number.isNaN(approvedLoanAmount) || approvedLoanAmount <= 0) {
                alert('Please enter a valid number for the approved amount.');
                return;
            }
        }

        const response = await fetch(`/api/admin/pending-loans/approve/${loanId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ adminId: getCurrentAdminId(), approvedLoanAmount })
        });

        const data = await response.json();
        if (data.success) {
            alert('Loan request approved successfully.');
            loadPendingLoans();
        } else {
            alert('Error approving loan: ' + (data.message || 'Unknown error'));
        }
    } catch (error) {
        console.error('Error approving loan request:', error);
        alert('Failed to approve loan request.');
    }
}

async function rejectLoanRequest(loanId) {
    if (!loanId) return;
    const rejectionReason = prompt('Enter a reason for rejecting this loan request:');
    if (rejectionReason === null) return;

    try {
        const response = await fetch(`/api/admin/pending-loans/reject/${loanId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ adminId: getCurrentAdminId(), rejectionReason })
        });

        const data = await response.json();
        if (data.success) {
            alert('Loan request rejected successfully.');
            loadPendingLoans();
        } else {
            alert('Error rejecting loan: ' + (data.message || 'Unknown error'));
        }
    } catch (error) {
        console.error('Error rejecting loan request:', error);
        alert('Failed to reject loan request.');
    }
}

async function submitSwapDecision(requestId, action) {
    const url = `/api/admin/shift-swap-requests/${action}/${requestId}`;
    const body = { adminId: getCurrentAdminId() };

    if (action === 'reject') {
        const reason = document.getElementById('swapRejectReason')?.value?.trim();
        if (!reason) {
            alert('Please enter a rejection reason before rejecting the request.');
            return;
        }
        body.rejectionReason = reason;
    }

    try {
        const response = await fetch(url, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const data = await response.json();
        if (data.success) {
            closeSwapRequestModal();
            loadPendingSwapRequests();
            loadRecentApprovals();
            loadPendingApprovals();
        } else {
            alert('Error: ' + (data.message || 'Unable to complete swap action'));
        }
    } catch (error) {
        console.error('Error submitting swap decision:', error);
        alert('Failed to submit swap decision');
    }
}

async function loadRecentApprovals() {
    try {
        const response = await fetch('/api/admin/recent-changes');
        const data = await response.json();

        if (!data.success || !data.recentChanges) {
            allRecentApprovals = [];
            window.renderRecentApprovals();
            return;
        }

        allRecentApprovals = data.recentChanges.map(change => ({
            ...change,
            type: 'profile'
        }));

        // Fetch and merge other approval types
        const [swapsRes, leavesRes, correctionsRes] = await Promise.all([
            fetch('/api/admin/recent-shifts-swaps').catch(() => ({ ok: false })),
            fetch('/api/admin/recent-leave-approvals').catch(() => ({ ok: false })),
            fetch('/api/admin/recent-time-corrections').catch(() => ({ ok: false }))
        ]);

        if (swapsRes.ok) {
            const swaps = await swapsRes.json();
            if (Array.isArray(swaps)) {
                allRecentApprovals.push(...swaps.map(s => ({ ...s, type: 'swap' })));
            }
        }

        if (leavesRes.ok) {
            const leaves = await leavesRes.json();
            if (Array.isArray(leaves)) {
                allRecentApprovals.push(...leaves.map(l => ({ ...l, type: 'leave' })));
            }
        }

        if (correctionsRes.ok) {
            const corrections = await correctionsRes.json();
            if (Array.isArray(corrections)) {
                allRecentApprovals.push(...corrections.map(c => ({ ...c, type: 'time' })));
            }
        }

        // Sort by date descending
        allRecentApprovals.sort((a, b) => new Date(b.approvedAt || b.updatedAt) - new Date(a.approvedAt || a.updatedAt));

        currentPage = 1;
        window.renderRecentApprovals();
    } catch (error) {
        console.error('Error loading recent approvals:', error);
        allRecentApprovals = [];
        window.renderRecentApprovals();
    }
}

// ===== RECENT APPROVALS WITH FILTERING & PAGINATION =====
let allRecentApprovals = [];
let currentFilter = 'all';
let currentPage = 1;
const itemsPerPage = 5;

window.filterRecentApprovals = function(filterType) {
    currentFilter = filterType;
    currentPage = 1;

    // Update filter button styles
    document.querySelectorAll('.filter-btn').forEach(btn => {
        if (btn.getAttribute('data-filter') === filterType) {
            btn.style.backgroundColor = '#003D7A';
            btn.style.color = 'white';
            btn.classList.remove('border', 'border-gray-300', 'text-gray-700', 'hover:bg-gray-50');
        } else {
            btn.style.backgroundColor = 'transparent';
            btn.style.color = '#1F2937';
            btn.classList.add('border', 'border-gray-300', 'text-gray-700');
        }
    });

    window.renderRecentApprovals();
};

window.renderRecentApprovals = function() {
    const container = document.getElementById('recentApprovalsContainer');
    if (!container) return;

    // Filter approvals
    let filtered = allRecentApprovals;
    if (currentFilter !== 'all') {
        filtered = allRecentApprovals.filter(a => a.type === currentFilter);
    }

    // Paginate
    const totalPages = Math.max(1, Math.ceil(filtered.length / itemsPerPage));
    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;
    const paged = filtered.slice(start, end);

    if (paged.length === 0) {
        container.innerHTML = '<div class="text-center text-gray-500 py-8"><i class="fas fa-check-circle text-green-500 text-2xl mb-2"></i><p>No approvals found</p></div>';
        updatePaginationInfo(filtered.length, start, end, totalPages);
        window.updatePaginationControls(totalPages);
        return;
    }

    let html = '';
    paged.forEach(approval => {
        const approvedDate = new Date(approval.approvedAt || approval.updatedAt).toLocaleDateString('en-US', {
            year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
        });

        const typeLabel = {
            'profile': 'Profile Change',
            'swap': 'Shift Swap',
            'leave': 'Leave Request',
            'time': 'Time Correction'
        }[approval.type] || 'Change';

        const statusColor = approval.status === 'approved' ? 'green' : 'red';
        const statusIcon = approval.status === 'approved' ? 'check-circle' : 'times-circle';

        const employeeName = approval.employeeId?.fullName || approval.employeeId || 'Unknown';
        const approverName = approval.approvedBy || 'Admin';

        html += `
            <div class="border border-gray-200 bg-white rounded-lg p-4">
                <div class="flex items-start justify-between">
                    <div>
                        <div class="flex items-center gap-3 mb-2">
                            <span class="inline-block bg-blue-100 text-blue-700 text-xs px-2 py-1 rounded font-medium">${typeLabel}</span>
                            <span class="text-sm text-gray-500">${approvedDate}</span>
                        </div>
                        <p class="font-semibold text-gray-900 text-sm">${employeeName}</p>
                        <p class="text-xs text-gray-500 mt-1">Approved by: ${approverName}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-${statusColor}-600 text-xs font-semibold flex items-center gap-1">
                            <i class="fas fa-${statusIcon}"></i> ${approval.status === 'approved' ? 'Approved' : 'Rejected'}
                        </span>
                    </div>
                </div>
            </div>
        `;
    });

    container.innerHTML = html;
    updatePaginationInfo(filtered.length, start, end, totalPages);
    window.updatePaginationControls(totalPages);
};

function updatePaginationInfo(total, start, end, totalPages) {
    const info = document.getElementById('paginationInfo');
    if (!info) return;
    const displayStart = total === 0 ? 0 : start + 1;
    const displayEnd = Math.min(end, total);
    info.textContent = total === 0 ? 'No approvals found' : `Showing ${displayStart} to ${displayEnd} of ${total} approvals`;
}

window.updatePaginationControls = function(totalPages) {
    const controls = document.getElementById('paginationControls');
    if (!controls) return;

    let html = '';

    // Previous button
    html += `
        <button onclick="goToPage(${currentPage - 1})" class="px-3 py-1 border border-gray-300 rounded text-gray-600 hover:bg-gray-100 transition disabled:opacity-50" ${currentPage <= 1 ? 'disabled' : ''}>
            <i class="fas fa-chevron-left"></i>
        </button>
    `;

    // Page numbers
    for (let i = 1; i <= totalPages; i++) {
        const isActive = i === currentPage;
        const className = isActive ? 'bg-[#003D7A] text-white' : 'border border-gray-300 text-gray-600 hover:bg-gray-100';
        html += `
            <button onclick="goToPage(${i})" class="px-3 py-1 rounded transition ${className}">
                ${i}
            </button>
        `;
    }

    // Next button
    html += `
        <button onclick="goToPage(${currentPage + 1})" class="px-3 py-1 border border-gray-300 rounded text-gray-600 hover:bg-gray-100 transition disabled:opacity-50" ${currentPage >= totalPages ? 'disabled' : ''}>
            <i class="fas fa-chevron-right"></i>
        </button>
    `;

    controls.innerHTML = html;
}

window.goToPage = function(pageNum) {
    const filter = currentFilter === 'all' ? allRecentApprovals : allRecentApprovals.filter(a => a.type === currentFilter);
    const totalPages = Math.max(1, Math.ceil(filter.length / itemsPerPage));

    if (pageNum >= 1 && pageNum <= totalPages) {
        currentPage = pageNum;
        window.renderRecentApprovals();
    }
};

async function approveTimeCorrection(correctionId) {

    try {
        const response = await fetch(`/api/admin/time-correction/${correctionId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'approve', adminId: getCurrentAdminId() })
        });
        
        console.log('📡 Response status:', response.status);
        const data = await response.json();
        console.log('📡 Response data:', data);

        if (data.success) {
            console.log('✅ Time correction approved successfully');
            console.log('📋 Approved correction details:', {
                date: data.correction.date,
                employeeId: data.correction.employeeId,
                correctionType: data.correction.correctionType,

async function submitLeaveDecision(requestId, action) {
    const url = `/api/admin/leave-requests/${action}/${requestId}`;
    const body = { adminId: getCurrentAdminId() };
    
    console.log('🔷 SUBMITTING LEAVE DECISION:', { url, action, requestId });

    if (action === 'reject') {
        const reason = document.getElementById('leaveRejectReason')?.value?.trim();
        if (!reason) {
            const errorEl = document.getElementById('leaveDecisionError');
            if (errorEl) {
                errorEl.textContent = 'Please provide a reason for rejection.';
                errorEl.classList.remove('hidden');
            }
            return;
        }
        body.rejectionReason = reason;
    }

    try {
        console.log('📤 Sending request:', { url, method: 'PUT', body });
        const response = await fetch(url, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });

        console.log('📥 Response status:', response.status);
        const data = await response.json();
        console.log('📥 Response data:', data);
        
        if (data.success) {
            console.log('✅ Leave decision successful!');
            closeLeaveRequestModal();
            await triggerNotification('Success', `Leave request ${action === 'approve' ? 'approved' : 'rejected'} successfully.`, 'success');
            
            // Add small delay to ensure backend database is updated
            console.log('⏳ Waiting 500ms for database update...');
            await new Promise(resolve => setTimeout(resolve, 500));
            
            console.log('🔄 Refreshing pending leave requests...');
            loadPendingLeaveRequests();
            loadPendingApprovals();
            console.log('🔄 Refresh complete');
        } else {
            console.error('❌ Leave decision failed:', data.message);
            const errorEl = document.getElementById('leaveDecisionError');
            if (errorEl) {
                errorEl.textContent = data.message || `Failed to ${action} leave request.`;
                errorEl.classList.remove('hidden');
            }
        }
    } catch (error) {
        console.error('❌ Error submitting leave decision:', error);
        const errorEl = document.getElementById('leaveDecisionError');
        if (errorEl) {
            errorEl.textContent = 'Failed to submit leave decision. Please try again.';
            errorEl.classList.remove('hidden');
        }
    }
}

function switchTab(tabName) {
    // 1. Hide all tab contents
    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
    
    // 2. Show selected tab content
    const activeTab = document.getElementById(`${tabName}-tab`);
    if (activeTab) activeTab.classList.remove('hidden');

    // 3. Update Sidebar UI
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active', 'text-[#003D7A]', 'bg-blue-50', 'border-[#003D7A]');
        btn.classList.add('text-gray-600', 'border-transparent');
        
        if (btn.getAttribute('data-tab') === tabName) {
            btn.classList.add('active', 'text-[#003D7A]', 'bg-blue-50', 'border-[#003D7A]');
            btn.classList.remove('text-gray-600', 'border-transparent');
        }
    });

    // 4. Update Progress Bar
    const progressMap = { profile: 25, employment: 50, documents: 75, qr: 100 };
    const countMap = { profile: 1, employment: 2, documents: 3, qr: 4 };
    
    document.getElementById('progressBar').style.width = `${progressMap[tabName]}%`;
    document.getElementById('tabCount').innerText = countMap[tabName];
}

async function renderCalendar(month, year) {

    // Update calendar header with current month/year
    const monthYearEl = document.getElementById('calendarMonthYear');
    if (monthYearEl) {
        const monthName = new Date(year, month - 1, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        monthYearEl.textContent = monthName;
    }

    try {
        // Fetch shifts and employees in parallel
        const [shiftRes, empRes] = await Promise.all([
            fetch(`/api/shifts?month=${month}&year=${year}`),
            fetch('/api/employees/list')
        ]);

        let shiftData = { shifts: [] };
        let empData = { employees: [] };

        // ========================
        // SAFE SHIFT JSON PARSING
        // ========================

            shiftData = await shiftRes.json();

function formatDate(date) {
    const d = new Date(date);
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}-${String(d.getUTCDate()).padStart(2, '0')}`;
}

function toDateStringUTC(date) {
    const d = new Date(date);
    return `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}-${String(d.getUTCDate()).padStart(2, '0')}`;
}

let draggedShiftId = null;

function dragStart(e) {
    draggedShiftId = e.target.dataset.shiftId;

async function dropShift(e) {
    const rawDate = e.currentTarget.dataset.date;
    const newDate = toDateStringUTC(rawDate + 'T00:00:00Z');

    const draggedEmployeeId = e.dataTransfer.getData('employeeId');
    const type = e.dataTransfer.getData('type');

    try {
        // ================================
        // ✅ CASE 1: NEW ASSIGNMENT
        // ================================
        if (type === 'new' && draggedEmployeeId) {

            // check duplicate
            const checkRes = await fetch(`/api/shifts/check?employeeId=${draggedEmployeeId}&date=${newDate}`);
            const checkData = await checkRes.json();

            if (checkData.exists) {
                alert('❌ Employee already has a shift on this date');
                return;
            }

            // create shift
            const res = await fetch('/api/shifts/assign', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    employeeId: draggedEmployeeId,
                    date: newDate,
                    shift: 'morning' // default (you can improve later)
                })
            });

            const data = await res.json();

            if (!data.success) {
                alert('❌ Failed to assign shift');
                return;
            }

            loadShifts();
            if (typeof loadEmployeeDragBox === 'function') { loadEmployeeDragBox(); }
            return;
        }

        // ================================
        // ✅ CASE 2: MOVE EXISTING SHIFT
        // ================================
        if (!draggedShiftId) return;

        const shiftRes = await fetch(`/api/shifts/${draggedShiftId}`);
        const shiftData = await shiftRes.json();

        const employeeId = shiftData.shift.employeeId;

        const checkRes = await fetch(`/api/shifts/check?employeeId=${employeeId}&date=${newDate}`);
        const checkData = await checkRes.json();

        if (checkData.exists) {
            alert('❌ Employee already has a shift on this date');
            return;
        }

        await fetch(`/api/shifts/${draggedShiftId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ date: newDate })
        });

        loadShifts();
        if (typeof loadEmployeeDragBox === 'function') { loadEmployeeDragBox(); }

    } catch (err) {
        console.error(err);
        alert('❌ Error in drag/drop');
    } finally {
        draggedShiftId = null;
    }
}

function isInRange(date, start, end) {
    const d = new Date(date);
    const s = new Date(start);
    const e = new Date(end);

    return d >= (s < e ? s : e) && d <= (s < e ? e : s);
}

    let current = new Date(start + 'T00:00:00Z');
    const last = new Date(end + 'T00:00:00Z');

    let requests = [];

    while (current <= last) {
        const dateStr = toDateStringUTC(current);

        requests.push(
            fetch('/api/shifts/assign', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    employeeId,
                    date: dateStr,
                    shift: 'morning'
                })
            })
        );

        current.setUTCDate(current.getUTCDate() + 1);
    }

    try {
        await Promise.all(requests);
        loadShifts();
        if (typeof loadEmployeeDragBox === 'function') { loadEmployeeDragBox(); }
    } catch (err) {

window.loadPayrollData = async function () {
    try {
        const startElement = document.getElementById('startDate');
        const endElement = document.getElementById('endDate');

        if (!startElement || !endElement) {
            console.error("Payroll date inputs not found.");
            return;
        }

        const start = startElement.value;
        const end = endElement.value;

        if (!start || !end) {
            console.warn("Missing start or end date — request canceled.");
            return;
        }

        const url = `/api/payroll/calculate-all?startDate=${encodeURIComponent(start)}&endDate=${encodeURIComponent(end)}`;
        console.log("Fetching payroll for:", url);

        const response = await fetch(url);
        if (!response.ok) throw new Error("Server error");

        const result = await response.json();

        payrollStats = result;
        currentPage = 1;

        if (typeof renderTablePage === 'function') {
            renderTablePage();
        }

    } catch (error) {
        console.error("Error calculating payroll:", error);
    }
};

window.updatePaginationUI = function(totalCount) {

window.saveAllowances = async function() {
    const empId = document.getElementById('allowancesEmpId').textContent;
    const name = document.getElementById('allowancesEmpName').textContent;

    const payload = {
        employeeId: empId,
        housing: parseFloat(document.getElementById('housingAllowance').value) || 0,
        travel: parseFloat(document.getElementById('travelAllowance').value) || 0,
        meal: parseFloat(document.getElementById('mealAllowance').value) || 0,
        hazardPay: parseFloat(document.getElementById('hazardPay').value) || 0
    };

    try {
        const saveBtn = document.querySelector('#editAllowancesModal button[onclick="saveAllowances()"]');
        if(saveBtn) saveBtn.disabled = true;

        const response = await fetch('/api/employees/update-allowances', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (data.success) {
            closeEditAllowancesModal();
            document.getElementById('allowanceSuccessName').textContent = name;
            document.getElementById('allowanceSuccessModal')?.classList.remove('hidden');

            if (typeof fetchAndRenderPayroll === "function") {
                fetchAndRenderPayroll();
            }

            // --- Trigger notification ---
            await triggerNotification(
    "Allowances Updated",
    `Allowances for ${name} were updated.`,
    "ALLOWANCE",
    "/admin/pages/payroll.html#allowances"
);
        } else {
            alert('Error updating allowances: ' + data.message);
        }
    } catch (err) {
        console.error('Save error:', err);
        alert('Failed to connect to server.');
    } finally {
        const saveBtn = document.querySelector('#editAllowancesModal button[onclick="saveAllowances()"]');
        if(saveBtn) saveBtn.disabled = false;
    }
};

function buildPayslipWeekRows(monthValue, periodValue, totalHours, totalGross, totalDeduct, totalNet) {
    const [year, month] = monthValue.split('-');
    const monthIndex = Number(month) - 1;
    const monthName = new Date(year, monthIndex).toLocaleString('default', { month: 'long' });
    const daysInMonth = new Date(year, monthIndex + 1, 0).getDate();
    const rows = [];

    if (periodValue === '1-15') {
        const weekRanges = [
            { label: `${monthName} 1 - 7`, factor: 7 },
            { label: `${monthName} 8 - 14`, factor: 7 },
            { label: `${monthName} 15`, factor: 1 }
        ];
        const totalFactor = 15;
        let remainingHours = totalHours;
        let remainingGross = totalGross;
        let remainingDeduct = totalDeduct;
        let remainingNet = totalNet;

        weekRanges.forEach((week, index) => {
            const isLast = index === weekRanges.length - 1;
            const share = week.factor / totalFactor;
            const hours = isLast ? remainingHours : Math.round(totalHours * share);
            const gross = isLast ? remainingGross : Math.round(totalGross * share);
            const deduct = isLast ? remainingDeduct : Math.round(totalDeduct * share);
            const net = isLast ? remainingNet : Math.round(totalNet * share);

            if (!isLast) {
                remainingHours -= hours;
                remainingGross -= gross;
                remainingDeduct -= deduct;
                remainingNet -= net;
            }

            rows.push([week.label, `${hours} hours`, `PHP ${gross.toLocaleString()}`, `PHP ${deduct.toLocaleString()}`, `PHP ${net.toLocaleString()}`]);
        });
    } else {
        const weekRanges = [
            { label: `${monthName} 16 - 22`, factor: 7 }
        ];

        if (daysInMonth > 22) {
            weekRanges.push({ label: `${monthName} 23 - ${daysInMonth}`, factor: daysInMonth - 22 });
        }

        const totalFactor = weekRanges.reduce((sum, item) => sum + item.factor, 0);
        let remainingHours = totalHours;
        let remainingGross = totalGross;
        let remainingDeduct = totalDeduct;
        let remainingNet = totalNet;

        weekRanges.forEach((week, index) => {
            const isLast = index === weekRanges.length - 1;
            const share = week.factor / totalFactor;
            const hours = isLast ? remainingHours : Math.round(totalHours * share);
            const gross = isLast ? remainingGross : Math.round(totalGross * share);
            const deduct = isLast ? remainingDeduct : Math.round(totalDeduct * share);
            const net = isLast ? remainingNet : Math.round(totalNet * share);

            if (!isLast) {
                remainingHours -= hours;
                remainingGross -= gross;
                remainingDeduct -= deduct;
                remainingNet -= net;
            }

            rows.push([week.label, `${hours} hours`, `PHP ${gross.toLocaleString()}`, `PHP ${deduct.toLocaleString()}`, `PHP ${net.toLocaleString()}`]);
        });
    }

    return rows;
}

function getPayrollDateRange(monthValue, periodValue) {
    const [year, month] = monthValue.split('-');
    const date = new Date(year, month - 1);
    const monthName = date.toLocaleString('default', { month: 'long' });

    if (periodValue === "1-15") {
        return `${monthName} 1 - 15, ${year}`;
    } else {
        const lastDay = new Date(year, month, 0).getDate();
        return `${monthName} 16 - ${lastDay}, ${year}`;
    }
}

        const pagibig = Number(emp?.pagibig || 0);

        const netPay = (totalBasic + totalAllowances) - totalDeductions;

            "Position": emp?.position || "N/A",

            "Pag-IBIG": pagibig,
            "Total Deductions": totalDeductions,
            // Final
            "NET PAY": netPay,
            "Payroll Period": dateRangeLabel
        };
    });

    const worksheet = XLSX.utils.json_to_sheet(dataToExport);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Payroll Details");

    // Clean filename for the Excel file
    const safeFileName = dateRangeLabel.replace(/[\s,]+/g, '_');
    XLSX.writeFile(workbook, `Payroll_Full_Report_${safeFileName}.xlsx`);
};

// --- TIME HELPERS ---

const convertTo24Hour = (timeStr) => {
    if (!timeStr || timeStr === '--:-- --') return '';
    const [time, modifier] = timeStr.split(' ');
    let [hours, minutes] = time.split(':');
    if (hours === '12') hours = '00';
    if (modifier === 'PM') hours = parseInt(hours, 10) + 12;
    return `${String(hours).padStart(2, '0')}:${minutes}`;
};

const formatTo12Hour = (time24) => {
    if (!time24) return '--:-- --';
    let [hours, minutes] = time24.split(':');
    hours = parseInt(hours);
    const modifier = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12 || 12;
    return `${String(hours).padStart(2, '0')}:${minutes} ${modifier}`;
};

const calculateDuration = (startStr, endStr) => {
    const parseToMinutes = (str) => {
        if (!str || str === '--:-- --') return null;
        if (str.includes('AM') || str.includes('PM')) {
            const [time, mod] = str.split(' ');
            let [h, m] = time.split(':').map(Number);
            if (h === 12 && mod === 'AM') h = 0;
            if (h !== 12 && mod === 'PM') h += 12;
            return h * 60 + m;
        }
        const [h, m] = str.split(':').map(Number);
        return h * 60 + m;
    };
    const startMin = parseToMinutes(startStr);
    const endMin = parseToMinutes(endStr);
    if (startMin === null || endMin === null) return "0.0";
    let diff = endMin - startMin;
    if (diff < 0) diff += 1440; 
    return (diff / 60).toFixed(1);
};

const getCheckInStatus = (checkInStr) => {
    const [time, mod] = checkInStr.split(' ');
    let [h, m] = time.split(':').map(Number);
    if (h === 12 && mod === 'AM') h = 0;
    if (h !== 12 && mod === 'PM') h += 12;
    const totalMinutes = h * 60 + m;
    if (totalMinutes >= 720) return { label: "Absent", classes: "bg-red-100 text-red-700" };
    if (totalMinutes > 480) return { label: `Late (${totalMinutes - 480}m)`, classes: "bg-amber-100 text-amber-700" };
    return { label: "On Time", classes: "bg-green-100 text-green-700" };
};

const getStatusClasses = (status) => {
    if (status === "Completed") return "bg-blue-100 text-blue-700";
    if (status.includes("Late")) return "bg-amber-100 text-amber-700";
    if (status === "On Time") return "bg-green-100 text-green-700";
    if (status === "Modified") return "bg-amber-100 text-amber-700";
    return "bg-red-100 text-red-700";
};

window.handleCheckIn = async function(isQR = false) {
    const empId = idInput.value.trim();

    const shift = todayShiftMap.get(empId);
    const employee = getEmployeeFromList(empId);

    const now = new Date();
    const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });

    const existingRow = document.getElementById(`row-${empId}`);

    // Prepare payload template
    let updatePayload = {
        empId: employee ? employee.employeeId : empId,
        name: employee ? employee.fullName : "Unknown",
        role: employee ? (employee.position || employee.role) : "Unknown",
        profilePic: employee ? employee.profilePic : null, // ADD THIS LINE
        initials: employee ? employee.fullName.split(' ').map(n => n[0]).join('').toUpperCase() : empId.slice(-3),
        color: "bg-indigo-500"
    };

    // Guard-friendly checks
    if (!employee || !shift) {
        if (!isQR) {
            alert(!employee ? "Employee ID not found." : "This employee has no shift scheduled today.");
        }
        return null; // Don't proceed
    }

    // Check-in / Check-out logic
    if (existingRow) {
        const checkOutCell = existingRow.querySelector('.check-out-cell');
        if (checkOutCell.textContent !== '--:-- --') {
            if (!isQR) alert("Already checked out.");
            return null;
        }

        const checkInTimeStr = existingRow.querySelector('.check-in-cell').textContent;
        updatePayload.checkIn = checkInTimeStr;
        updatePayload.checkOut = timeString;
        updatePayload.duration = `${calculateDuration(checkInTimeStr, timeString)}h`;
        updatePayload.status = "Completed";
    } else {
        const status = getCheckInStatus(timeString);
        updatePayload.checkIn = timeString;
        updatePayload.checkOut = '';
        updatePayload.duration = "0.0h";
        updatePayload.status = status.label;
    }

    // Add shift info
    updatePayload.shift = shift.shift;
    updatePayload.department = shift.department;
    updatePayload.shiftDate = shift.date;

    await saveToDB(updatePayload);
    await loadFromDB();

    // Notification (optional for guard)
    const actionType = updatePayload.checkOut !== '--:-- --' ? 'Check-out' : 'Check-in';
    await triggerNotification(
        'Attendance Logged',
        `${employee.fullName} recorded a ${actionType} at ${timeString}.`,
        'ATTENDANCE',
        `/admin/pages/attendance.html#employee-${employee._id}`
    );

    idInput.value = '';

    return updatePayload; // Useful for QR scanner to show info
};

window.saveAttendanceByDate = async function() {
    const selectedDate = document.getElementById('attendance-date').value;

    if (!selectedDate) {
        alert("Please select a date.");
        return;
    }

    const rows = document.querySelectorAll('#attendanceTableBody tr');

    if (rows.length === 0) {
        alert("No attendance data to save.");
        return;
    }

    // ✅ FIRST CONFIRMATION
    const confirmSave = confirm(`Save attendance for ${selectedDate}?`);
    if (!confirmSave) return;

    const payload = {
        date: selectedDate,
        records: []
    };

    rows.forEach(row => {
        payload.records.push({
            empId: row.id.replace('row-', ''),
            name: row.querySelector('.font-semibold').textContent,
            checkIn: row.querySelector('.check-in-cell').textContent,
            checkOut: row.querySelector('.check-out-cell').textContent,
            status: row.querySelector('.status-badge').textContent,
            duration: row.querySelector('.duration-cell').textContent
        });
    });

    try {
        const res = await fetch('/api/attendance/save-date', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const result = await res.json();

        if (result.success) {

            // ✅ SECOND CONFIRMATION (overwrite warning)
            if (result.overwritten) {
                alert(`Existing attendance for ${selectedDate} was overwritten.`);
            } else {
                alert(`Attendance for ${selectedDate} saved!`);
            }

            await triggerNotification(
                'Attendance Saved',
                `Attendance for ${selectedDate} has been archived.`,
                'ATTENDANCE',
                `/admin/pages/attendance.html#${selectedDate}`
            );

        } else {
            alert("Error saving attendance.");
        }

    } catch (err) {
        console.error(err);
        alert("Server error.");
    }
};

window.loadAttendanceByDate = async function() {
    const selectedDate = document.getElementById('attendance-date').value;

    if (!selectedDate) {
        alert("Please select a date.");
        return;
    }

    // ✅ CONFIRM BEFORE LOADING (important to avoid overwriting UI)
    const confirmLoad = confirm(`Load attendance for ${selectedDate}? This will replace current data.`);
    if (!confirmLoad) return;

    try {
        const res = await fetch(`/api/attendance/load-date?date=${selectedDate}`);
        const result = await res.json();

        if (result.success && result.data) {

            tableBody.innerHTML = '';

            result.data.records.forEach(record => {
                renderRow(record);
            });

            updateAbsenceTracking();

            alert(`Loaded attendance for ${selectedDate}`);

        } else {
            alert("No saved attendance for this date.");
        }

    } catch (err) {
        console.error(err);
        alert("Failed to load attendance.");
    }
};

function renderConversations(conversations) {
    const container = document.getElementById('conversationsList');
    
    if (conversations.length === 0) {
        container.innerHTML = '<div class="p-4 text-center text-gray-500">No conversations yet</div>';
        return;
    }

    let html = '';
    conversations.forEach(conv => {
        const lastMessage = conv.lastMessage || {};
        const participant = conv.participants[0] || {};
        const unread = conv.unreadCount || 0;
        const avatar = conv.type === 'group'
            ? (conv.groupPhoto || '/uploads/profiles/default-avatar.png')
            : (participant.profilePic || '/uploads/profiles/default-avatar.png');
        const name = conv.type === 'group' ? conv.name : (participant.fullName || 'Unknown');
        const time = lastMessage.timestamp ? new Date(lastMessage.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
        const unreadBadge = unread > 0 ? `<span class="ml-2 inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold text-white bg-red-500">${unread}</span>` : '';

        html += `
            <div onclick="openConversation('${conv._id}')" class="p-4 border-b border-gray-100 hover:bg-gray-50 cursor-pointer">
                <div class="flex items-center gap-3">
                    <img src="${avatar}" class="w-12 h-12 rounded-full" alt="Avatar">

                        <p class="text-sm text-gray-600 truncate">${lastMessage.content || 'No messages yet'}</p>
                    </div>
                </div>
            </div>
        `;
    });

    container.innerHTML = html;
}

function updateUnreadBadge(conversations) {
    const badge = document.getElementById('unreadMessagesBadge');
    let totalUnread = 0;

    conversations.forEach(conv => {
        const unread = conv.unreadCount || 0;
        if (unread > 0) {
            totalUnread += unread;
        } else if (conv.lastMessage && conv.lastMessage.senderId !== currentUserId) {
            totalUnread++;
        }
    });

    if (totalUnread > 0) {
        badge.classList.remove('hidden');
    } else {
        badge.classList.add('hidden');
    }
}

function renderMessages(messages) {
    const container = document.getElementById('messagesContainer');
    
    if (messages.length === 0) {
        container.innerHTML = '<div class="text-center text-gray-500 py-8">No messages yet. Start the conversation!</div>';
        return;
    }

    let html = '';
    messages.forEach(msg => {
        const isOwn = msg.senderId === currentUserId;
        const time = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        const avatar = msg.sender?.profilePic || '/uploads/profiles/default-avatar.png';
        const senderName = msg.sender?.fullName || (msg.senderId === currentUserId ? 'You' : (msg.senderId || 'Unknown'));

        if (msg.messageType === 'text') {
            const isSeen = isOwn && Array.isArray(msg.readBy) && msg.readBy.length > 0;
            html += `
                <div class="flex ${isOwn ? 'justify-end' : 'justify-start'} mb-4">
                    <div class="flex ${isOwn ? 'flex-row-reverse' : 'flex-row'} items-end gap-2 max-w-xs lg:max-w-md">
                        <img src="${avatar}" class="w-8 h-8 rounded-full" alt="Avatar">
                        <div class="bg-${isOwn ? 'blue' : 'gray'}-100 p-3 rounded-lg">
                            ${isOwn ? '' : `<p class="text-xs text-gray-600 mb-1">${senderName}</p>`}
                            <p class="text-sm">${msg.content}</p>
                            <p class="text-xs text-gray-500 mt-1">${time}${isSeen ? ' · Seen' : ''}</p>
                        </div>
                    </div>
                </div>
            `;
        } else if (msg.messageType === 'image') {
            html += `
                <div class="flex ${isOwn ? 'justify-end' : 'justify-start'} mb-4">
                    <div class="flex ${isOwn ? 'flex-row-reverse' : 'flex-row'} items-end gap-2 max-w-xs lg:max-w-md">
                        <img src="${avatar}" class="w-8 h-8 rounded-full" alt="Avatar">
                        <div class="bg-${isOwn ? 'blue' : 'gray'}-100 p-3 rounded-lg">
                            ${isOwn ? '' : `<p class="text-xs text-gray-600 mb-1">${senderName}</p>`}
                            <img src="${msg.mediaUrl}" class="max-w-full rounded" onclick="openImageModal('${msg.mediaUrl}')" style="cursor: pointer;">
                            <p class="text-xs text-gray-500 mt-1">${time}</p>
                        </div>
                    </div>
                </div>
            `;
        } else if (msg.messageType === 'video') {
            html += `
                <div class="flex ${isOwn ? 'justify-end' : 'justify-start'} mb-4">
                    <div class="flex ${isOwn ? 'flex-row-reverse' : 'flex-row'} items-end gap-2 max-w-xs lg:max-w-md">
                        <img src="${avatar}" class="w-8 h-8 rounded-full" alt="Avatar">
                        <div class="bg-${isOwn ? 'blue' : 'gray'}-100 p-3 rounded-lg">
                            ${isOwn ? '' : `<p class="text-xs text-gray-600 mb-1">${senderName}</p>`}
                            <video controls class="max-w-full rounded">
                                <source src="${msg.mediaUrl}" type="video/mp4">
                            </video>
                            <p class="text-xs text-gray-500 mt-1">${time}</p>
                        </div>
                    </div>
                </div>
            `;
        }
    });

    container.innerHTML = html;
    container.scrollTop = container.scrollHeight;
}

function closeChat() {
    currentConversationId = null;
    document.getElementById('chatHeader').classList.add('hidden');
    document.getElementById('messagesContainer').classList.add('hidden');
    document.getElementById('messageInput').classList.add('hidden');
    document.getElementById('messagesContainer').innerHTML = '';
}

async function sendMessage() {
    const textInput = document.getElementById('messageText');
    const content = textInput.value.trim();
    
    if (!content || !currentConversationId) {
        console.warn('⚠️ Admin: Cannot send message: no content or conversation selected');
        return;
    }

    console.log('📤 Admin: Sending message:', content, 'to conversation:', currentConversationId);

    try {
        const response = await fetch('/api/messaging/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                conversationId: currentConversationId,
                senderId: currentUserId,
                content,
                messageType: 'text'
            })
        });

        const data = await response.json();
        if (data.success) {
            console.log('✅ Admin: Message sent successfully');
            textInput.value = '';
            await loadMessages(currentConversationId);
            await loadConversations(); // Update conversation list
        } else {
            console.error('❌ Admin: Failed to send message:', data.message);
        }
    } catch (error) {
        console.error('❌ Admin: Error sending message:', error);
    }
}

async function sendMediaMessage(input, type) {
    const file = input.files[0];
    if (!file || !currentConversationId) return;

    const formData = new FormData();
    formData.append('conversationId', currentConversationId);
    formData.append('senderId', currentUserId);
    formData.append('content', `${type} shared`);
    formData.append('messageType', type);
    formData.append('media', file);

    try {
        console.log('📤 Admin: Sending media message:', type);
        const response = await fetch('/api/messaging/messages', {
            method: 'POST',
            body: formData
        });

        if (!response.ok) {
            const text = await response.text();
            console.error('❌ Admin: Media upload failed:', response.status, text);
            return;
        }

        const data = await response.json();
        if (data.success) {
            console.log('✅ Admin: Media message sent successfully');
            input.value = '';
            toggleAttachmentMenu();
            await loadMessages(currentConversationId);
            await loadConversations();
        } else {
            console.error('❌ Admin: Failed to send media:', data.message);
        }
    } catch (error) {
        console.error('❌ Admin: Error sending media:', error);
    }
}

function toggleAttachmentMenu() {
    document.getElementById('attachmentMenu').classList.toggle('hidden');
}

function handleMessageKeydown(event) {
    if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
    }
}

async function markMessagesAsRead(conversationId) {
    try {
        await fetch(`/api/messaging/messages/read/${conversationId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId: currentUserId })
        });
    } catch (error) {
        console.error('Admin: Error marking messages as read:', error);
    }
}

// Search employees for new chat
let searchTimeout;
document.getElementById('newChatSearch').addEventListener('input', function(e) {
    clearTimeout(searchTimeout);
    const query = e.target.value.trim();
    
    if (query.length < 2) {
        document.getElementById('searchResults').innerHTML = '';
        document.getElementById('createGroupBtn').classList.add('hidden');
        return;
    }

    searchTimeout = setTimeout(() => searchEmployees(query, 'newChat'), 300);
});

document.getElementById('messageSearch').addEventListener('input', function(e) {
    clearTimeout(searchTimeout);
    const query = e.target.value.trim();
    const resultsContainer = document.getElementById('messageSearchResults');

    if (query.length < 2) {
        resultsContainer.innerHTML = '';
        resultsContainer.classList.add('hidden');
        return;
    }

    searchTimeout = setTimeout(() => searchEmployees(query, 'quick'), 300);
});

async function searchEmployees(query, target = 'newChat') {
    try {
        console.log('🔍 Admin: Searching employees with query:', query, 'target:', target);
        const response = await fetch(`/api/messaging/search-employees?query=${encodeURIComponent(query)}&currentUserId=${currentUserId}`);
        const data = await response.json();

        if (data.success) {
            console.log('✅ Admin: Found employees:', data.employees.length);
            if (target === 'quick') {
                renderQuickSearchResults(data.employees);
            } else {
                renderSearchResults(data.employees);
            }
        } else {
            console.error('❌ Admin: Search failed:', data.message);
        }
    } catch (error) {
        console.error('❌ Admin: Error searching employees:', error);
    }
}

function renderQuickSearchResults(employees) {
    const container = document.getElementById('messageSearchResults');
    if (!container) return;

    if (employees.length === 0) {
        container.innerHTML = '<div class="p-4 text-center text-gray-500">No employees found</div>';
        container.classList.remove('hidden');
        return;
    }

    let html = '';
    employees.forEach(emp => {
        html += `
            <div onclick="startConversation('${emp.employeeId}')" class="p-3 border-b border-gray-200 hover:bg-gray-50 cursor-pointer">
                <div class="flex items-center gap-3">
                    <img src="${emp.profilePic || '/uploads/profiles/default-avatar.png'}" class="w-10 h-10 rounded-full" alt="Avatar">
                    <div class="flex-1 min-w-0">
                        <h4 class="font-semibold text-gray-900 truncate">${emp.fullName}</h4>
                        <p class="text-sm text-gray-600 truncate">${emp.employeeId} • ${emp.position || 'Staff'}</p>
                    </div>
                </div>
            </div>
        `;
    });

    container.innerHTML = html;
    container.classList.remove('hidden');
}

function renderSearchResults(employees) {
    const container = document.getElementById('searchResults');
    
    if (employees.length === 0) {
        container.innerHTML = '<div class="p-4 text-center text-gray-500">No employees found</div>';
        document.getElementById('createGroupBtn').classList.add('hidden');
        return;
    }

    let html = '';
    employees.forEach(emp => {
        html += `
            <div class="p-3 border-b border-gray-100 hover:bg-gray-50">
                <div class="flex items-center gap-3">
                    <input type="checkbox" value="${emp.employeeId}" class="w-4 h-4 text-[#003D7A] rounded focus:ring-[#003D7A]">
                    <img src="${emp.profilePic || '/uploads/profiles/default-avatar.png'}" class="w-10 h-10 rounded-full" alt="Avatar">
                    <div class="flex-1 cursor-pointer" onclick="startConversation('${emp.employeeId}')">
                        <h4 class="font-semibold text-gray-900">${emp.fullName}</h4>
                        <p class="text-sm text-gray-600">${emp.employeeId} • ${emp.position || 'Staff'}</p>
                    </div>
                </div>
            </div>
        `;
    });

    container.innerHTML = html;
    
    // Show create group button if multiple results
    if (employees.length > 1) {
        document.getElementById('createGroupBtn').classList.remove('hidden');
    } else {
        document.getElementById('createGroupBtn').classList.add('hidden');
    }
}

async function startConversation(employeeId) {
    try {
        console.log('🚀 Admin: Starting conversation with:', employeeId);
        const response = await fetch('/api/messaging/conversations', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                participants: [currentUserId, employeeId],
                type: 'direct',
                createdBy: currentUserId
            })
        });

        const data = await response.json();
        if (data.success) {
            console.log('✅ Admin: Conversation created/loaded');
            closeNewChatModal();
            await loadConversations();
            openConversation(data.conversation._id);
        } else {
            console.error('❌ Admin: Failed to start conversation:', data.message);
        }
    } catch (error) {
        console.error('❌ Admin: Error starting conversation:', error);
    }
}

async function createGroupChat() {
    const selectedEmployees = Array.from(document.querySelectorAll('#searchResults input[type="checkbox"]:checked'))
        .map(cb => cb.value);

    if (selectedEmployees.length < 2) {
        alert('Please select at least 2 employees for a group chat');
        return;
    }

    const groupName = prompt('Enter group name:');
    if (!groupName) return;

    try {
        console.log('👥 Admin: Creating group chat with:', selectedEmployees.length, 'members');
        const response = await fetch('/api/messaging/groups', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: groupName,
                participants: selectedEmployees,
                createdBy: currentUserId
            })
        });

        const data = await response.json();
        if (data.success) {
            console.log('✅ Admin: Group chat created');
            closeNewChatModal();
            await loadConversations();
            openConversation(data.conversation._id);
        } else {
            console.error('❌ Admin: Failed to create group:', data.message);
        }
    } catch (error) {
        console.error('❌ Admin: Error creating group:', error);
    }
}

function openImageModal(src) {
    // Simple image modal
    const modal = document.createElement('div');
    modal.className = 'fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-[70]';
    modal.innerHTML = `
        <div class="relative max-w-4xl max-h-full p-4">
            <img src="${src}" class="max-w-full max-h-full object-contain">
            <button onclick="this.parentElement.parentElement.remove()" class="absolute top-4 right-4 text-white text-2xl">&times;</button>
        </div>
    `;
    document.body.appendChild(modal);
}

// Socket.IO for real-time messaging
socket.on('new-message', async (message) => {
    console.log('📨 Admin: Received new message via socket:', message);
    playNotificationSound();
    if (message.conversationId === currentConversationId) {
        console.log('📨 Admin: Message is for current conversation, reloading messages');
        await loadMessages(currentConversationId);
        if (message.senderId !== currentUserId) {
            await markMessagesAsRead(currentConversationId);
        }
    }
    await loadConversations(); // Update conversation list
});

socket.on('messages-read', async ({ conversationId, readerId }) => {
    if (conversationId === currentConversationId) {
        await loadMessages(currentConversationId);
    }
    await loadConversations();
});

function triggerGroupPhotoUpload() {
    const input = document.getElementById('groupPhotoInput');
    if (!input) return;
    input.click();
}

async function uploadGroupPhoto(input) {
    const file = input.files[0];
    if (!file || !currentConversationId || currentConversationType !== 'group') return;

    const formData = new FormData();
    formData.append('groupPhoto', file);

    try {
        const response = await fetch(`/api/messaging/groups/${currentConversationId}/photo`, {
            method: 'POST',
            body: formData
        });

        if (!response.ok) {
            const text = await response.text();
            console.error('❌ Admin: Group photo upload failed:', response.status, text);
            return;
        }

        const data = await response.json();
        if (data.success) {
            const avatarUrl = data.conversation.groupPhoto || '/uploads/profiles/default-avatar.png';
            document.getElementById('chatAvatar').src = avatarUrl;
            await loadConversations();
        } else {
            console.error('❌ Admin: Failed to upload group photo:', data.message);
        }
    } catch (err) {
        console.error('❌ Admin: Error uploading group photo:', err);
    }
}

// Close modals when clicking outside
document.addEventListener('click', function(e) {
    const messagingModal = document.getElementById('messagingModal');
    const newChatModal = document.getElementById('newChatModal');
    
    if (e.target === messagingModal) {
        toggleMessagingModal();
    }
    if (e.target === newChatModal) {
        closeNewChatModal();
    }
});

// Load conversations on page load
document.addEventListener('DOMContentLoaded', function() {
    const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser') || '{}');
    currentUserId = loggedInUser.employeeId || localStorage.getItem('employeeId') || null;
    if (currentUserId) {
        console.log('🚀 Admin: Initializing messaging for user:', currentUserId);
        loadConversations();
    } else {
        console.warn('⚠️ Admin: No employeeId found in localStorage for messaging. Please ensure loggedInUser.employeeId is set.');
    }
});
