<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - Zeal Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="max-w-6xl mx-auto p-6">
        <div class="bg-white rounded-lg shadow-sm">
            <div class="p-6 border-b border-gray-200">
                <h1 class="text-2xl font-bold text-gray-900">Messages</h1>
                <p class="text-gray-600 mt-1">Communicate with your colleagues</p>
            </div>

            <div class="p-6">
                <div class="text-center py-12">
                    <i class="fas fa-comments text-6xl text-gray-300 mb-4"></i>
                    <h3 class="text-xl font-semibold text-gray-900 mb-2">Messaging System</h3>
                    <p class="text-gray-600 mb-6">Click the chat icon in the header to start messaging with your colleagues.</p>
                    <button onclick="toggleMessagingModal()" class="bg-[#003D7A] text-white px-6 py-3 rounded-lg hover:bg-[#0052A3] transition">
                        <i class="fas fa-comments mr-2"></i>Open Messages
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
