<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal - ZealHR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        .nav-link.active {
            background-color: #EFF6FF;
            color: #003D7A;
            border-left: 4px solid #003D7A;
        }

        .highlight-flash {
            animation: highlight-flash 2s ease-in-out;
            border: 2px solid #f59e0b;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.7);
        }

        .highlight-notification {
            border-left: 4px solid #f59e0b;
            background-color: #fff7ed;
            transition: background-color 0.3s ease;
        }

        @keyframes highlight-flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>

                    <i class="fas fa-calendar-alt w-5"></i>

                <a href="javascript:void(0)" onclick="loadContent('payroll')" class="nav-link flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-lg transition" data-page="payroll">

                <a href="javascript:void(0)" onclick="loadContent('performance')" class="nav-link flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-lg transition" data-page="performance">
                    <i class="fas fa-chart-line w-5"></i>
                    <span>My Performance</span>

                <a href="javascript:void(0)" onclick="loadContent('leave')" class="nav-link flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-lg transition" data-page="leave">
                    <i class="fas fa-paper-plane w-5"></i>

            </div>

        <!-- Main Content -->
        <main class="flex-1 ml-64">
            <!-- Top Header -->
            <header class="bg-white shadow-sm px-8 py-4 flex items-center justify-between sticky top-0 z-10">
                <div>
                    <h1 class="text-xl font-bold text-gray-900" id="pageTitle">My Profile</h1>
                    <p id="headerWelcome" class="text-sm text-gray-500">Welcome back, User</p>
                </div>
                
                <div class="flex items-center gap-4">
                    
                    <!-- Messaging Button -->
                    <div class="relative">
                        <button onclick="toggleMessagingModal()" class="relative p-2 text-gray-600 hover:bg-gray-100 rounded-lg transition">
                            <i class="fas fa-comments text-lg"></i>

                        </button>

                    <!-- Notifications from HR -->

                            <span id="notificationBadge" class="absolute top-0 right-0 w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center hidden">0</span>
                        </button>
                        
                        <!-- Notifications Dropdown -->

                            <div class="p-4 border-b border-gray-200 flex items-center justify-between">

                                <button onclick="markAllNotificationsRead()" class="text-[#003D7A] text-xs font-medium hover:underline">Mark all read</button>
                            </div>
                            <div id="notificationList" class="max-h-80 overflow-y-auto">

                            </div>
                            <div class="p-3 border-t border-gray-200">
                                <button onclick="loadContent('notifications'); document.getElementById('notificationDropdown').classList.add('hidden');" class="w-full text-center text-[#003D7A] font-medium text-sm hover:underline">
                                    View All Notifications
                                </button>
                            </div>
                        </div>
                    </div>
<audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

                    <!-- Profile Menu -->
                    <div class="flex items-center gap-3 pl-4 border-l border-gray-200">
                        <img class="w-10 h-10 rounded-full object-cover" id="headerProfilePic" src="/uploads/profiles/default-avatar.png" alt="Profile">
                        <div class="hidden md:block">
                            <p id="headerProfileName" class="font-semibold text-gray-900 text-sm">User</p>
                            <p id="headerProfileInfo" class="text-xs text-gray-500">Loading...</p>
                        </div>
                    </div>

            </header>

            <!-- Content Area -->

                <!-- Dashboard Content will be loaded here -->
            </div>
        </main>
    </div>

    <!-- Messaging Modal -->
    <div id="messagingModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-lg shadow-xl w-full max-w-4xl h-[600px] flex">
                <!-- Conversations Sidebar -->
                <div class="w-1/3 border-r border-gray-200 flex flex-col">
                    <div class="p-4 border-b border-gray-200">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-lg font-bold text-gray-900">Messages</h3>
                            <div class="flex items-center gap-2">
                                <button onclick="openNewChatModal()" class="p-2 text-gray-600 hover:bg-gray-100 rounded-lg">
                                    <i class="fas fa-plus"></i>
                                </button>
                                <button onclick="toggleMessagingModal()" class="p-2 text-gray-600 hover:bg-gray-100 rounded-lg">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                        </div>
                        <div class="relative">
                            <input type="text" id="messageSearch" placeholder="Search employees..." 
                                   class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#003D7A] focus:border-transparent">
                            <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                        </div>
                        <div id="messageSearchResults" class="mt-3 max-h-64 overflow-y-auto rounded-lg border border-gray-200 bg-white hidden"></div>
                    </div>
                    <div id="conversationsList" class="flex-1 overflow-y-auto">
                        <!-- Conversations will be loaded here -->
                    </div>
                </div>

                <!-- Chat Area -->
                <div class="flex-1 flex flex-col">
                    <div id="chatHeader" class="p-4 border-b border-gray-200 hidden">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <img id="chatAvatar" src="/uploads/profiles/default-avatar.png" class="w-10 h-10 rounded-full">
                                <div>
                                    <h4 id="chatName" class="font-semibold text-gray-900">Select a conversation</h4>
                                    <p id="chatStatus" class="text-sm text-gray-500">Active</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <button id="groupPhotoButton" onclick="triggerGroupPhotoUpload()" class="p-2 text-gray-600 hover:bg-gray-100 rounded-full hidden" title="Change group photo">
                                    <i class="fas fa-camera"></i>
                                </button>
                                <button onclick="closeChat()" class="p-2 text-gray-600 hover:bg-gray-100 rounded-lg">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <input type="file" id="groupPhotoInput" accept="image/*" class="hidden" onchange="uploadGroupPhoto(this)">

                    <div id="messagesContainer" class="flex-1 overflow-y-auto p-4 hidden">
                        <!-- Messages will be loaded here -->
                    </div>

                    <div id="messageInput" class="p-4 border-t border-gray-200 hidden">
                        <div class="flex items-end gap-2">
                            <button onclick="toggleAttachmentMenu()" class="p-2 text-gray-600 hover:bg-gray-100 rounded-lg">
                                <i class="fas fa-paperclip"></i>
                            </button>
                            <div class="flex-1 relative">

                                        rows="1" onkeydown="handleMessageKeydown(event)"></textarea>
                            </div>
                            <button onclick="sendMessage()" class="p-3 bg-[#003D7A] text-white rounded-lg hover:bg-[#0052A3] transition">

                            </button>
                        </div>
                        <!-- Attachment Menu -->
                        <div id="attachmentMenu" class="hidden mt-2 p-2 bg-gray-50 rounded-lg">

                                    <i class="fas fa-image"></i>
                                    <span>Image</span>
                                    <input type="file" accept="image/*" onchange="sendMediaMessage(this, 'image')" class="hidden">
                                </label>
                                <label class="flex items-center gap-2 p-2 text-gray-600 hover:bg-gray-100 rounded cursor-pointer">
                                    <i class="fas fa-video"></i>

    <!-- New Chat Modal -->

            <div class="bg-white rounded-lg shadow-xl w-full max-w-md">
                <div class="p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-bold text-gray-900">Start New Conversation</h3>
                        <button onclick="closeNewChatModal()" class="p-2 text-gray-600 hover:bg-gray-100 rounded-lg">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Search Employees</label>
                            <input type="text" id="newChatSearch" placeholder="Type employee name or ID..."

                        </div>
                        
                        <div id="searchResults" class="max-h-60 overflow-y-auto border border-gray-200 rounded-lg">
                            <!-- Search results will appear here -->
                        </div>

                        <div class="flex gap-2 pt-4">
                            <button onclick="closeNewChatModal()" class="flex-1 px-4 py-2 text-gray-600 border border-gray-300 rounded-lg hover:bg-gray-50">
                                Cancel
                            </button>
                            <button onclick="createGroupChat()" id="createGroupBtn" class="flex-1 px-4 py-2 bg-[#003D7A] text-white rounded-lg hover:bg-[#0052A3] hidden">
                                Create Group

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
      
        function toggleNotificationDropdown() {
            document.getElementById('notificationDropdown').classList.toggle('hidden');
        }

        // Close dropdowns when clicking outside
        document.addEventListener('click', function(e) {
            const notifBtn = e.target.closest('[onclick="toggleNotificationDropdown()"]');
            const notifDropdown = document.getElementById('notificationDropdown');
 
            if (!notifBtn && !notifDropdown?.contains(e.target)) {
                notifDropdown?.classList.add('hidden');
            }
        });

        // SOCKET.IO for realtime notifications
        const socket = io(window.location.origin, { transports: ['websocket'] });

        socket.on('connect', () => {
            console.log('Employee socket connected:', socket.id);
            // Join user room for messaging
            const employeeId = localStorage.getItem('employeeId');
            if (employeeId) {
                socket.emit('join-user-room', employeeId);
            }
        });

        socket.on('connect_error', (err) => {
            console.error('Employee socket connection error:', err.message);
        });

        socket.on('new-notification', (notif) => {
            const employeeId = (localStorage.getItem('employeeId') || '').toUpperCase();
            const userRole = (JSON.parse(localStorage.getItem('loggedInUser') || '{}').role || '').toLowerCase();

            if (!employeeId) return;

            // Show only relevant notifications for this employee
            if (notif.recipientId?.toUpperCase() === employeeId || notif.recipientRole?.toLowerCase() === userRole) {
                loadEmployeeNotifications();
                // Play notification sound
                const audio = document.getElementById('notif-sound');
                if (audio) {
                    audio.currentTime = 0;
                    audio.play().catch(err => console.error('Error playing notification sound:', err));
                }
            }
        });

        socket.on('notifications-updated', () => {
            loadEmployeeNotifications();
            // Play notification sound
            const audio = document.getElementById('notif-sound');
            if (audio) {
                audio.currentTime = 0;
                audio.play().catch(err => console.error('Error playing notification sound:', err));
            }
        });

        function enableSound() {
            const audio = document.getElementById('notif-sound');
            if (!audio) return;
            audio.play().then(() => {
                audio.pause();
                audio.currentTime = 0;
                console.log('🔊 Sound unlocked!');
            }).catch(() => {});
        }

        document.addEventListener('click', enableSound, { once: true });
        document.addEventListener('keydown', enableSound, { once: true });

        function playMessageSound() {
            const audio = document.getElementById('notif-sound');
            if (!audio) return;
            audio.currentTime = 0;
            audio.play().catch(err => console.error('Error playing message sound:', err));
        }





        function triggerGroupPhotoUpload() {
            const input = document.getElementById('groupPhotoInput');
            if (input) {
                input.click();
            }
        }

        async function uploadGroupPhoto(input) {
            try {
                if (!input.files || input.files.length === 0) return;
                if (!currentConversationId) {
                    alert('No conversation selected.');
                    return;
                }

                const formData = new FormData();
                formData.append('groupPhoto', input.files[0]);

                const response = await fetch(`/api/messaging/groups/${currentConversationId}/photo`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const text = await response.text();
                    console.error('Error uploading group photo:', response.status, text);
                    alert('Failed to upload group photo. See console for details.');
                    return;
                }

                const data = await response.json();
                if (data.success) {
                    await loadConversationDetails(currentConversationId);
                    await loadConversations();
                } else {
                    alert(data.message || 'Failed to update group photo');
                }
            } catch (error) {
                console.error('Error uploading group photo:', error);
                alert('There was an error uploading the group photo.');
            }
        }

        // Load initial page (check URL hash for persisted state)
        document.addEventListener('DOMContentLoaded', function() {
            const hash = window.location.hash.substring(1);
            const validPages = ['profile', 'schedule', 'payroll', 'messages', 'performance', 'leave', 'attendance', 'notifications'];
            const initialPage = validPages.includes(hash) ? hash : 'profile';
            loadContent(initialPage);
            
            // Load pending changes + notifications on page load
            setTimeout(() => {
                loadPendingChanges();
                loadEmployeeNotifications();
            }, 500);
        });

        // Handle browser back/forward navigation
        window.addEventListener('hashchange', function() {
            const hash = window.location.hash.substring(1);
            if (hash) loadContent(hash);
        });

        // --- SUBMIT PROFILE CHANGE FOR APPROVAL ---
        async function submitProfileChange(changeType, changedData) {
            try {
                const employeeId = localStorage.getItem('employeeId');
                if (!employeeId) {
                    alert('Employee ID not found');
                    return;
                }

                const response = await fetch('/api/employee/submit-profile-change', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        employeeId,
                        changeType,
                        changedData
                    })
                });

                const data = await response.json();

                if (data.success) {
                    // Refresh latest profile (fetch from server)
                    await loadEmployeeProfile();

                    // Close the modal
                    if (changeType === 'profile') closeEditProfileModal();
                    else if (changeType === 'personal') closeEditPersonalModal();
                    else if (changeType === 'emergency') closeEditEmergencyModal();
                    else if (changeType === 'government') closeEditGovernmentModal();
                    else if (changeType === 'bank') closeEditBankModal();

                    // Show success
                    showSubmitSuccess();
                    
                    // Reload pending changes
                    loadPendingChanges();
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (error) {
                console.error("Error submitting profile change:", error);
                alert('Failed to submit changes');
            }
        }

        // --- LOAD PENDING PROFILE CHANGES ---
        async function loadPendingChanges() {
            try {
                const employeeId = localStorage.getItem('employeeId');
                if (!employeeId) return;

                const response = await fetch(`/api/employee/pending-changes/${employeeId}`);
                const data = await response.json();

                if (data.success && data.pendingChanges) {
                    const container = document.getElementById('pendingApprovalsContainer');
                    if (!container) return;
                    
                    if (data.pendingChanges.length === 0) {
                        container.innerHTML = '<div class="p-4 bg-green-50 border border-green-200 rounded-lg text-center"><p class="text-sm text-green-700"><i class="fas fa-check-circle mr-2"></i>No pending changes</p></div>';
                        return;
                    }

                    let html = '';
                    const changeTypeLabels = {
                        'personal': 'Personal Information',
                        'contact': 'Contact Details',
                        'emergency': 'Emergency Contact',
                        'government': 'Government IDs',
                        'bank': 'Bank Information',
                        'profile': 'Profile Photo'
                    };

                    data.pendingChanges.forEach(change => {
                        const submittedDate = new Date(change.submittedAt).toLocaleDateString('en-US', { 
                            year: 'numeric', 
                            month: 'short', 
                            day: 'numeric' 
                        });

                        html += `
                            <div class="p-4 border border-yellow-200 bg-yellow-50 rounded-lg">
                                <div class="flex items-center justify-between mb-2">
                                    <span class="font-semibold text-gray-900 text-sm">${changeTypeLabels[change.changeType] || change.changeType}</span>
                                    <span class="text-xs bg-yellow-100 text-yellow-700 px-2 py-1 rounded-full font-medium">Pending</span>
                                </div>
                                <p class="text-xs text-gray-600 mb-2">Submitted: ${submittedDate}</p>
                                <p class="text-xs text-gray-500">Awaiting HR approval</p>
                            </div>
                        `;
                    });

                    container.innerHTML = html;
                }
            } catch (error) {
                console.error("Error loading pending changes:", error);
            }
        }

        // --- LOAD EMPLOYEE PROFILE DATA ---
        async function loadEmployeeProfile() {
            try {
                const employeeId = localStorage.getItem('employeeId');
                if (!employeeId) {
                    console.error("Employee ID not found in localStorage");
                    return;
                }

                const response = await fetch(`/api/employee/profile/${employeeId}`);
                const data = await response.json();

                if (!data.success || !data.profile) {
                    console.error("Failed to load profile:", data);
                    return;
                }

                const profile = data.profile;

                // Calculate initials from full name
                const initials = profile.fullName
                    ?.split(' ')
                    .map(n => n[0])
                    .join('')
                    .substring(0, 2)
                    .toUpperCase() || '--';

                // Update Profile Card
                document.getElementById('profileImage').src = profile.profilePic || '/uploads/profiles/default-avatar.png';
                document.getElementById('profileFullName').textContent = profile.fullName || 'User';
                document.getElementById('profilePosition').textContent = profile.position || 'Staff';
                document.getElementById('profileEmployeeId').textContent = profile.employeeId;
                document.getElementById('profileDepartment').textContent = profile.department || 'N/A';
                
                // Format hire date
                const hireDate = profile.hireDate ? new Date(profile.hireDate) : null;
                const hireDateStr = hireDate ? `Joined ${hireDate.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })}` : 'N/A';
                document.getElementById('profileHireDate').textContent = hireDateStr;
                
                document.getElementById('profileEmail').textContent = profile.email || 'N/A';
                document.getElementById('profilePhone').textContent = profile.phoneNumber || 'N/A';

                const qrImage = document.getElementById('profileQrImage');
                const downloadQrBtn = document.getElementById('downloadQrBtn');
                const qrPreviewContainer = document.getElementById('qrPreviewContainer');
                const qrNotAvailable = document.getElementById('qrNotAvailable');
                if (profile.qrCodePath) {
                    const qrUrl = profile.qrCodePath.startsWith('/') ? profile.qrCodePath : `/${profile.qrCodePath}`;
                    qrImage.src = qrUrl;
                    qrImage.alt = `${profile.fullName || 'Employee'} QR Code`;
                    downloadQrBtn.href = qrUrl;
                    downloadQrBtn.setAttribute('download', `${profile.employeeId || 'employee'}-qr.png`);
                    qrPreviewContainer.classList.remove('hidden');
                    qrNotAvailable.classList.add('hidden');
                } else {
                    qrPreviewContainer.classList.add('hidden');
                    qrNotAvailable.classList.remove('hidden');
                }

                // Update Employment Summary
                document.getElementById('employmentType').textContent = profile.contractType || 'Full-time';
                document.getElementById('department').textContent = profile.department || 'N/A';
                document.getElementById('employeeGrade').textContent = profile.grade || 'N/A';

                // Update Bank & Government IDs in profile display
                document.getElementById('sssNumberDetail').textContent = profile.sssNumber || 'N/A';
                document.getElementById('philhealthNumberDetail').textContent = profile.philHealthNumber || profile.philhealthNumber || 'N/A';
                document.getElementById('pagibigNumberDetail').textContent = profile.pagIbigNumber || profile.pagibigNumber || 'N/A';
                document.getElementById('tinDetail').textContent = profile.tin || 'N/A';

        async function loadEmployeeSchedule() {
            try {
                const employeeId = localStorage.getItem('employeeId');
                if (!employeeId) return;

                const currentDate = new Date();
                const month = currentDate.getMonth() + 1;
                const year = currentDate.getFullYear();

                const response = await fetch(`/api/shifts/employee/${employeeId}?month=${month}&year=${year}`);
                const data = await response.json();

                if (data.success) {
                    // Calculate summary
                    let workingDays = 0;
                    let daysOff = 0;
                    let leaveDays = 0;
                    let overtimeHours = 0;

                    data.shifts.forEach(shift => {
                        if (shift.shift === 'off') daysOff++;
                        else if (shift.shift === 'leave') leaveDays++;
                        else {
                            workingDays++;
                            // Assume afternoon/evening shifts are overtime (8 hours each)
                            if (shift.shift === 'afternoon' || shift.shift === 'evening') {
                                overtimeHours += 8;
                            }
                        }
                    });

                    // Calculate total days in month and unassigned days as days off
                    const daysInMonth = new Date(year, month, 0).getDate();
                    const assignedDays = workingDays + leaveDays + daysOff;
                    const unassignedDays = daysInMonth - assignedDays;
                    const totalDaysOff = daysOff + unassignedDays;

                    // Update summary
                    document.getElementById('workingDays').textContent = workingDays;
                    document.getElementById('daysOff').textContent = totalDaysOff;
                    document.getElementById('leaveDays').textContent = leaveDays;
                    document.getElementById('overtimeHours').textContent = overtimeHours + 'h';

                    renderCalendar(data.shifts, month, year);
                }
            } catch (error) {
                console.error('Error loading schedule:', error);
            }
        }

        function renderCalendar(shifts, month, year) {
            const grid = document.getElementById('calendarGrid');
            if (!grid) return;

            // Create a map of date to shift
            const shiftMap = {};
            shifts.forEach(shift => {
                const date = new Date(shift.date).getDate();
                shiftMap[date] = shift;
            });

            // Get first day of month
            const firstDay = new Date(year, month - 1, 1).getDay(); // 0=Sun

            // Days in month
            const daysInMonth = new Date(year, month, 0).getDate();

            // Previous month days
            const prevMonthDays = new Date(year, month - 1, 0).getDate();

            let html = '';

            let day = 1;
            for (let week = 0; week < 6; week++) {
                for (let wd = 0; wd < 7; wd++) {
                    if (week === 0 && wd < firstDay) {
                        // Previous month
                        const prevDay = prevMonthDays - firstDay + wd + 1;
                        html += `<div class="p-2 border-b border-r min-h-[100px] bg-gray-50 text-gray-400">
<span class="text-sm">${prevDay}</span>
</div>`;
                    } else if (day > daysInMonth) {
                        // Next month
                        const nextDay = day - daysInMonth;
                        html += `<div class="p-2 border-b border-r min-h-[100px] bg-gray-50 text-gray-400">
<span class="text-sm">${nextDay}</span>
</div>`;
                        day++;
                    } else {
                        // Current month
                        const shift = shiftMap[day];
                        let content = `<span class="text-sm font-medium">${day}</span>`;
                        if (shift) {
                            const display = shiftDisplay[shift.shift] || { time: shift.shift, color: 'bg-gray-500 text-white' };
                            content += `<div class="mt-1 ${display.color} text-xs p-1 rounded">${display.time}</div>`;
                        }
                        const isToday = new Date().getDate() === day && new Date().getMonth() === month - 1 && new Date().getFullYear() === year;
                        const todayClass = isToday ? 'bg-blue-50' : '';
                        html += `<div class="p-2 border-b border-r min-h-[100px] ${todayClass}">${content}</div>`;
                        day++;
                    }
                }
                if (day > daysInMonth + 7) break;
            }
            grid.innerHTML = html;

            // Update month year
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('monthYear').textContent = `${monthNames[month-1]} ${year}`;
        }

function showEmptyState() {
    const loadingEl = document.getElementById('payslipLoadingState');
    const emptyEl = document.getElementById('payslipEmptyState');
    const containerEl = document.getElementById('payslipListContainer');
    
    if (loadingEl) loadingEl.classList.add('hidden');
    if (emptyEl) emptyEl.classList.remove('hidden');
    if (containerEl) containerEl.innerHTML = '';
}

function populateYearFilter() {
    const years = new Set();
    allPayslips.forEach(payslip => {
        const year = payslip.month.split('-')[0];
        years.add(year);
    });

    const yearFilter = document.getElementById('payslipYearFilter');
    if (yearFilter) {
        const sortedYears = Array.from(years).sort().reverse();
        const allYearsOption = yearFilter.querySelector('option[value=""]');
        yearFilter.innerHTML = '<option value="">All Years</option>';
        sortedYears.forEach(year => {
            const option = document.createElement('option');
            option.value = year;
            option.textContent = year;
            yearFilter.appendChild(option);
        });
    }
}

window.filterPayslipsByYear = function() {
    const selectedYear = document.getElementById('payslipYearFilter').value;
    let filtered = allPayslips;

    if (selectedYear) {
        filtered = allPayslips.filter(p => p.month.startsWith(selectedYear));
    }

    renderPayslips(filtered);
};

    const loadingEl = document.getElementById('payslipLoadingState');
    const emptyEl = document.getElementById('payslipEmptyState');

    console.log('🔍 DOM elements found:', {
        container: !!container,
        loadingEl: !!loadingEl,
        emptyEl: !!emptyEl
    });

    if (loadingEl) {
        loadingEl.classList.add('hidden');
        console.log('✅ Loading state hidden');
    }

    if (!payslips || payslips.length === 0) {
        console.log('❌ No payslips to render, showing empty state');
        if (emptyEl) emptyEl.classList.remove('hidden');
        if (container) container.innerHTML = '';

function updateYTDSummary(payslips) {
    let totalEarnings = 0;
    let totalDeductions = 0;
    let totalTax = 0;

    payslips.forEach(payslip => {
        if (payslip.employeeRecord) {
            const record = payslip.employeeRecord;
            totalEarnings += (record.baseSalary || 0) + (record.allowances || 0);
            totalDeductions += record.deductions || 0;
            totalTax += record.breakdown?.tax || 0;
        }
    });

    const maxEarnings = totalEarnings * 1.2; // 120% for bar width calculation
    const maxDeductions = totalDeductions * 1.2;

    document.getElementById('ytdEarnings').textContent = `₱${totalEarnings.toLocaleString('en-PH', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
    document.getElementById('ytdDeductions').textContent = `₱${totalDeductions.toLocaleString('en-PH', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
    document.getElementById('ytdTax').textContent = `₱${totalTax.toLocaleString('en-PH', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

    document.getElementById('ytdEarningsBar').style.width = (totalEarnings / maxEarnings * 100) + '%';
    document.getElementById('ytdDeductionsBar').style.width = (totalDeductions / maxDeductions * 100) + '%';
}

async function arrayBufferToBase64(buffer) {
    let binary = '';
    const bytes = new Uint8Array(buffer);
    const chunkSize = 0x8000;
    for (let i = 0; i < bytes.length; i += chunkSize) {
        const chunk = bytes.subarray(i, i + chunkSize);
        binary += String.fromCharCode.apply(null, chunk);
    }
    return btoa(binary);
}

async function ensurePdfFont(doc) {
    if (window.pdfPesoFontLoaded) return true;
    if (!doc.addFileToVFS || !doc.addFont) return false;

    try {
        const fontUrl = 'https://fonts.gstatic.com/s/roboto/v30/KFOmCnqEu92Fr1Me5Q.ttf';
        const response = await fetch(fontUrl);
        if (!response.ok) throw new Error('Font fetch failed');

        const buffer = await response.arrayBuffer();
        const fontData = await arrayBufferToBase64(buffer);
        doc.addFileToVFS('Roboto-Regular.ttf', fontData);
        doc.addFont('Roboto-Regular.ttf', 'Roboto', 'normal');
        window.pdfPesoFontLoaded = true;
        return true;
    } catch (error) {
        console.warn('Unable to load PDF font, falling back to ASCII currency:', error);
        return false;
    }
}

function formatPdfCurrency(amount, usePesoSymbol) {
    const formatted = amount.toLocaleString('en-PH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return usePesoSymbol ? `₱${formatted}` : `P ${formatted}`;
}

    function handleFiles(files) {
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            
            // Validate file type
            if (!allowedTypes.includes(file.type)) {
                alert(`Invalid file type: ${file.name}. Only PDF, JPG, and PNG are allowed.`);
                continue;
            }
            
            // Validate file size
            if (file.size > maxFileSize) {
                alert(`File too large: ${file.name}. Maximum size is 5MB.`);
                continue;
            }
            
            // Check for duplicates
            if (uploadedFiles.some(f => f.name === file.name)) {
                alert(`File already added: ${file.name}`);
                continue;
            }
            
            uploadedFiles.push(file);
        }
        
        updateFileList();
    }

        if (uploadedFiles.length === 0) {

    function getFileIcon(type) {
        if (type === 'application/pdf') return 'fa-file-pdf';
        if (type.startsWith('image/')) return 'fa-file-image';
        return 'fa-file';
    }

    function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function removeFile(index) {
        uploadedFiles.splice(index, 1);
        updateFileList();

    function submitLeaveRequest(event) {
        event.preventDefault();
        
        const formData = new FormData();
        const employeeId = localStorage.getItem('employeeId');
        
        if (!employeeId) {
            alert('Employee ID not found. Please log in again.');
            return;
        }

        // Get form values
        const leaveType = document.querySelector('select[name="leaveType"]').value;
        const duration = document.querySelector('select[name="duration"]').value;
        const startDate = document.getElementById('startDate').value;
        const endDate = document.getElementById('endDate').value;
        const reason = document.querySelector('textarea[name="reason"]').value;

        // Validate required fields
        if (!leaveType || !duration || !startDate || !endDate || !reason.trim()) {
            alert('Please fill in all required fields.');
            return;
        }

        // Validate dates
        const start = new Date(startDate);
        const end = new Date(endDate);
        const today = new Date();
        today.setHours(0, 0, 0, 0);

        if (start < today) {
            alert('Start date cannot be in the past.');
            return;
        }

        if (end < start) {
            alert('End date cannot be before start date.');
            return;
        }

        // Calculate leave days
        const leaveDays = calculateLeaveDays(start, end, duration);
        
        // Check leave balance
        if (leaveBalance.used + leaveDays > leaveBalance.total) {
            alert(`Insufficient leave balance. You have ${leaveBalance.total - leaveBalance.used} days remaining, but this request requires ${leaveDays} days.`);
            return;
        }

        // Validate that dates are within current month
        const currentMonth = today.getMonth();
        const currentYear = today.getFullYear();
        
        if (start.getMonth() !== currentMonth || start.getFullYear() !== currentYear ||
            end.getMonth() !== currentMonth || end.getFullYear() !== currentYear) {
            alert('Leave requests can only be made for the current month.');
            return;
        }

        // Optional: Check if any selected dates have shifts (suggestion, not restriction)
        const selectedDates = [];
        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
            selectedDates.push(d.toISOString().split('T')[0]);
        }
        
        const shiftDates = employeeShifts.map(shift => new Date(shift.date).toISOString().split('T')[0]);
        const datesWithShifts = selectedDates.filter(date => shiftDates.includes(date));
        
        if (datesWithShifts.length === 0) {

    function calculateLeaveDays(startDate, endDate, duration) {
        const start = new Date(startDate);
        const end = new Date(endDate);
        const days = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
        
        if (duration === 'half-am' || duration === 'half-pm') {
            return 0.5;
        }
        return days;
    }

            attendanceStatusEl.textContent = rate >= 90 ? 'Excellent' : rate >= 75 ? 'Good' : 'Needs Improvement';

    function updateKPIs(data) {
        const kpiContainer = document.getElementById('kpiContainer');
        if (!kpiContainer) return;

        const kpis = [
            {
                name: 'Attendance Rate',
                current: data.attendanceRate || 0,
                target: 100,
                status: (data.attendanceRate || 0) >= 90 ? 'Excellent' : (data.attendanceRate || 0) >= 75 ? 'Good' : 'Needs Improvement'
            },
            {
                name: 'Work Intensity',
                current: data.workIntensity || 0,
                target: 100,
                status: (data.workIntensity || 0) >= 90 ? 'Excellent' : (data.workIntensity || 0) >= 75 ? 'Good' : 'Needs Improvement'
            },
            {
                name: 'Punctuality Rate',
                current: data.punctualityRate || 0,
                target: 100,
                status: (data.punctualityRate || 0) >= 90 ? 'Excellent' : (data.punctualityRate || 0) >= 75 ? 'Good' : 'Needs Improvement'
            },
            {
                name: 'Survey Score',
                current: data.survey ? Number(data.survey.percentage_score) : 0,
                target: 100,
                status: data.performanceLevel || 'No Data'
            }
        ];

        let html = '';
        kpis.forEach(kpi => {
            const percentage = Math.min((kpi.current / kpi.target) * 100, 100);
            const statusColor = kpi.status === 'Excellent' ? 'green' : kpi.status === 'Good' ? 'green' : kpi.status === 'Very Good' ? 'green' : 'yellow';

            html += `
                <div>

                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-3">
                        <div class="bg-${statusColor}-500 h-3 rounded-full" style="width: ${percentage}%"></div>
                    </div>
                    <p class="text-xs text-${statusColor}-600 mt-1">${percentage.toFixed(0)}% - ${kpi.status}</p>
                </div>
            `;
        });

        kpiContainer.innerHTML = html;

    function updatePerformanceTrend(archives) {
        const trendContainer = document.getElementById('performanceTrend');
        const averageScoreEl = document.getElementById('averageScore');

        if (!trendContainer) return;

        // Calculate average score
        const scores = archives.map(a => a.kpi?.overallScore || 0).filter(s => s > 0);
        const avgScore = scores.length > 0 ? (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(0) : 0;
        if (averageScoreEl) averageScoreEl.textContent = `${avgScore}%`;

        // Create trend bars for last 4 quarters
        const quarters = ['Q1', 'Q2', 'Q3', 'Q4'];
        let html = '';

        quarters.forEach((quarter, index) => {
            const archive = archives.find(a => {
                const month = a.month;
                const quarterNum = Math.ceil(month / 3);
                return quarterNum === (index + 1);
            });

            const score = archive ? (archive.kpi?.overallScore || 0) : 0;
            const height = Math.max((score / 100) * 100, 10); // Minimum 10% height

            html += `
                <div class="flex flex-col items-center flex-1">
                    <div class="w-full bg-blue-500 rounded-t" style="height: ${height}%"></div>
                    <p class="text-xs text-gray-600 mt-2">${quarter}</p>
                </div>
            `;
        });

        trendContainer.innerHTML = html;
    }

    function updatePerformanceReviews(surveys) {
        const reviewsContainer = document.getElementById('reviewsContainer');
        if (!reviewsContainer) return;

        if (!surveys || surveys.length === 0) {
            reviewsContainer.innerHTML = '<div class="text-center text-gray-500 py-8">No performance reviews available</div>';
            return;

        surveys.slice(0, 3).forEach(survey => { // Show latest 3 reviews

                year: 'numeric',
                month: 'short',

    }

    document.addEventListener('DOMContentLoaded', loadEmployeePerformance);

        }

    
    
    // --- MESSAGING FUNCTIONS ---

    let currentConversationId = null;
    let currentConversationType = null;
    let currentConversationParticipants = [];
    let currentUserId = null;

    function toggleMessagingModal() {
        console.log('🔄 Toggling messaging modal');
        const modal = document.getElementById('messagingModal');
        modal.classList.toggle('hidden');
        
        if (!modal.classList.contains('hidden')) {
            console.log('📱 Opening messaging modal, loading conversations');
            currentUserId = localStorage.getItem('employeeId');
            loadConversations();
        } else {
            console.log('📱 Closing messaging modal');
        }
    }

    function openNewChatModal() {
        document.getElementById('newChatModal').classList.remove('hidden');
        document.getElementById('newChatSearch').focus();
    }

    function closeNewChatModal() {
        document.getElementById('newChatModal').classList.add('hidden');
        document.getElementById('newChatSearch').value = '';
        document.getElementById('searchResults').innerHTML = '';
        document.getElementById('createGroupBtn').classList.add('hidden');
    }

    async function loadConversations() {
        try {
            console.log('📥 Loading conversations for user:', currentUserId);
            const response = await fetch(`/api/messaging/conversations/${currentUserId}`);
            const data = await response.json();

            if (data.success) {
                console.log('✅ Loaded conversations:', data.conversations.length);
                renderConversations(data.conversations);
                updateUnreadBadge(data.conversations);
            } else {
                console.error('❌ Failed to load conversations:', data.message);
            }
        } catch (error) {
            console.error('❌ Error loading conversations:', error);
        }
    }

    function updateUnreadBadge(conversations) {
        const badge = document.getElementById('unreadMessagesBadge');
        let totalUnread = 0;

        conversations.forEach(conv => {
            const unread = conv.unreadCount || 0;
            if (unread > 0) {
                totalUnread += unread;
            } else if (conv.lastMessage && conv.lastMessage.senderId !== currentUserId) {
                totalUnread++;
            }
        });

        if (totalUnread > 0) {
            badge.classList.remove('hidden');
        } else {
            badge.classList.add('hidden');
        }
    }

    function renderConversations(conversations) {
        const container = document.getElementById('conversationsList');
        
        if (conversations.length === 0) {
            container.innerHTML = '<div class="p-4 text-center text-gray-500">No conversations yet</div>';
            return;
        }

        let html = '';
        conversations.forEach(conv => {
            const lastMessage = conv.lastMessage || {};
            const participant = conv.participants[0] || {};
            const unread = conv.unreadCount || 0;
            const avatar = conv.type === 'group'
                ? (conv.groupPhoto || '/uploads/profiles/default-avatar.png')
                : (participant.profilePic || '/uploads/profiles/default-avatar.png');
            const name = conv.type === 'group' ? conv.name : (participant.fullName || 'Unknown');
            const time = lastMessage.timestamp ? new Date(lastMessage.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';
            const unreadBadge = unread > 0 ? `<span class="ml-2 inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-semibold text-white bg-red-500">${unread}</span>` : '';

            html += `
                <div onclick="openConversation('${conv._id}')" class="p-4 border-b border-gray-100 hover:bg-gray-50 cursor-pointer">
                    <div class="flex items-center gap-3">
                        <img src="${avatar}" class="w-12 h-12 rounded-full" alt="Avatar">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center justify-between">
                                <h4 class="font-semibold text-gray-900 truncate">${name}${unreadBadge}</h4>
                                <span class="text-xs text-gray-500">${time}</span>
                            </div>
                            <p class="text-sm text-gray-600 truncate">${lastMessage.content || 'No messages yet'}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
    }

    async function openConversation(conversationId) {
        currentConversationId = conversationId;
        
        // Show chat area
        document.getElementById('chatHeader').classList.remove('hidden');
        document.getElementById('messagesContainer').classList.remove('hidden');
        document.getElementById('messageInput').classList.remove('hidden');
        
        // Load conversation details and messages
        await loadConversationDetails(conversationId);
        await loadMessages(conversationId);
        
        // Mark messages as read
        await markMessagesAsRead(conversationId);
        await loadConversations();
    }

    async function loadConversationDetails(conversationId) {
        try {
            const response = await fetch(`/api/messaging/conversations/${currentUserId}`);
            const data = await response.json();

            if (data.success) {
                const conv = data.conversations.find(c => c._id.toString() === conversationId);
                if (conv) {
                    currentConversationParticipants = conv.participants || [];
                    const participant = conv.participants[0] || {};
                currentConversationType = conv.type;
                const avatarUrl = conv.type === 'group'
                    ? (conv.groupPhoto || '/uploads/profiles/default-avatar.png')
                    : (participant.profilePic || '/uploads/profiles/default-avatar.png');
                document.getElementById('chatAvatar').src = avatarUrl;
                document.getElementById('chatName').textContent = conv.type === 'group' ? conv.name : (participant.fullName || 'Unknown');
                document.getElementById('chatStatus').textContent = 'Active';
                const groupBtn = document.getElementById('groupPhotoButton');
                if (groupBtn) {
                    if (conv.type === 'group') {
                        groupBtn.classList.remove('hidden');
                    } else {
                        groupBtn.classList.add('hidden');
                    }
                }
                }
            }
        } catch (error) {
            console.error('Error loading conversation details:', error);
        }
    }

    async function loadMessages(conversationId) {
        try {
            const response = await fetch(`/api/messaging/messages/${conversationId}`);
            const data = await response.json();

            if (data.success) {
                renderMessages(data.messages);
            }
        } catch (error) {
            console.error('Error loading messages:', error);
        }
    }

    function renderMessages(messages) {
        const container = document.getElementById('messagesContainer');
        if (!container) return;
        container.classList.remove('hidden');
        
        if (messages.length === 0) {
            container.innerHTML = '<div class="text-center text-gray-500 py-8">No messages yet. Start the conversation!</div>';
            return;
        }

        let html = '';
        messages.forEach(msg => {
            const isOwn = msg.senderId === currentUserId;
            const time = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const avatar = msg.sender?.profilePic || '/uploads/profiles/default-avatar.png';
            const senderName = msg.sender?.fullName || (msg.senderId === currentUserId ? 'You' : (msg.senderId || 'Unknown'));

            if (msg.messageType === 'text') {
                const isSeen = isOwn && Array.isArray(msg.readBy) && msg.readBy.length > 0;
                html += `
                    <div class="flex ${isOwn ? 'justify-end' : 'justify-start'} mb-4">
                        <div class="flex ${isOwn ? 'flex-row-reverse' : 'flex-row'} items-end gap-2 max-w-xs lg:max-w-md">
                            <img src="${avatar}" class="w-8 h-8 rounded-full" alt="Avatar">
                            <div class="bg-${isOwn ? 'blue' : 'gray'}-100 p-3 rounded-lg">
                                ${isOwn ? '' : `<p class="text-xs text-gray-600 mb-1">${senderName}</p>`}
                                <p class="text-sm">${msg.content}</p>
                                <p class="text-xs text-gray-500 mt-1">${time}${isSeen ? ' · Seen' : ''}</p>
                            </div>
                        </div>
                    </div>
                `;
            } else if (msg.messageType === 'image') {
                html += `
                    <div class="flex ${isOwn ? 'justify-end' : 'justify-start'} mb-4">
                        <div class="flex ${isOwn ? 'flex-row-reverse' : 'flex-row'} items-end gap-2 max-w-xs lg:max-w-md">
                            <img src="${avatar}" class="w-8 h-8 rounded-full" alt="Avatar">
                            <div class="bg-${isOwn ? 'blue' : 'gray'}-100 p-3 rounded-lg">
                                ${isOwn ? '' : `<p class="text-xs text-gray-600 mb-1">${senderName}</p>`}
                                <img src="${msg.mediaUrl}" class="max-w-full rounded" onclick="openImageModal('${msg.mediaUrl}')" style="cursor: pointer;">
                                <p class="text-xs text-gray-500 mt-1">${time}</p>
                            </div>
                        </div>
                    </div>
                `;
            } else if (msg.messageType === 'video') {
                html += `
                    <div class="flex ${isOwn ? 'justify-end' : 'justify-start'} mb-4">
                        <div class="flex ${isOwn ? 'flex-row-reverse' : 'flex-row'} items-end gap-2 max-w-xs lg:max-w-md">
                            <img src="${avatar}" class="w-8 h-8 rounded-full" alt="Avatar">
                            <div class="bg-${isOwn ? 'blue' : 'gray'}-100 p-3 rounded-lg">
                                ${isOwn ? '' : `<p class="text-xs text-gray-600 mb-1">${senderName}</p>`}
                                <video controls class="max-w-full rounded">
                                    <source src="${msg.mediaUrl}" type="video/mp4">
                                </video>
                                <p class="text-xs text-gray-500 mt-1">${time}</p>
                            </div>
                        </div>
                    </div>
                `;
            }
        });

        container.innerHTML = html;
        container.scrollTop = container.scrollHeight;
    }

    function closeChat() {
        currentConversationId = null;
        document.getElementById('chatHeader').classList.add('hidden');
        document.getElementById('messagesContainer').classList.add('hidden');
        document.getElementById('messageInput').classList.add('hidden');
        document.getElementById('messagesContainer').innerHTML = '';
    }

    async function sendMessage() {
        const textInput = document.getElementById('messageText');
        const content = textInput.value.trim();
        
        if (!content || !currentConversationId) {
            console.warn('⚠️ Cannot send message: no content or conversation selected');
            return;
        }

        console.log('📤 Sending message:', content, 'to conversation:', currentConversationId);

        try {
            const response = await fetch('/api/messaging/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    conversationId: currentConversationId,
                    senderId: currentUserId,
                    content,
                    messageType: 'text'
                })
            });

            const data = await response.json();
            if (data.success) {
                console.log('✅ Message sent successfully');
                textInput.value = '';
                await loadMessages(currentConversationId);
                await loadConversations(); // Update conversation list
            } else {
                console.error('❌ Failed to send message:', data.message);
            }
        } catch (error) {
            console.error('❌ Error sending message:', error);
        }
    }

    async function sendMediaMessage(input, type) {
        const file = input.files[0];
        if (!file || !currentConversationId) return;

        const formData = new FormData();
        formData.append('conversationId', currentConversationId);
        formData.append('senderId', currentUserId);
        formData.append('content', `${type} shared`);
        formData.append('messageType', type);
        formData.append('media', file);

        try {
            const response = await fetch('/api/messaging/messages', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const text = await response.text();
                console.error('Error sending media:', response.status, text);
                return;
            }

            const data = await response.json();
            if (data.success) {
                input.value = '';
                toggleAttachmentMenu();
                await loadMessages(currentConversationId);
                await loadConversations();
            }
        } catch (error) {
            console.error('Error sending media:', error);
        }
    }

    function toggleAttachmentMenu() {
        document.getElementById('attachmentMenu').classList.toggle('hidden');
    }

    function handleMessageKeydown(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    }

    async function markMessagesAsRead(conversationId) {
        try {
            await fetch(`/api/messaging/messages/read/${conversationId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: currentUserId })
            });
        } catch (error) {
            console.error('Error marking messages as read:', error);
        }
    }

    // Search employees for new chat
    let searchTimeout;
    document.getElementById('newChatSearch').addEventListener('input', function(e) {
        clearTimeout(searchTimeout);
        const query = e.target.value.trim();
        
        if (query.length < 2) {
            document.getElementById('searchResults').innerHTML = '';
            document.getElementById('createGroupBtn').classList.add('hidden');
            return;
        }

        searchTimeout = setTimeout(() => searchEmployees(query, 'newChat'), 300);
    });

    document.getElementById('messageSearch').addEventListener('input', function(e) {
        clearTimeout(searchTimeout);
        const query = e.target.value.trim();
        const resultsContainer = document.getElementById('messageSearchResults');

        if (query.length < 2) {
            resultsContainer.innerHTML = '';
            resultsContainer.classList.add('hidden');
            return;
        }

        searchTimeout = setTimeout(() => searchEmployees(query, 'quick'), 300);
    });

    async function searchEmployees(query, target = 'newChat') {
        try {
            console.log('🔍 Searching employees with query:', query, 'target:', target);
            const response = await fetch(`/api/messaging/search-employees?query=${encodeURIComponent(query)}&currentUserId=${currentUserId}`);
            const data = await response.json();

            if (data.success) {
                console.log('✅ Found employees:', data.employees.length);
                if (target === 'quick') {
                    renderQuickSearchResults(data.employees);
                } else {
                    renderSearchResults(data.employees);
                }
            } else {
                console.error('❌ Search failed:', data.message);
            }
        } catch (error) {
            console.error('❌ Error searching employees:', error);
        }
    }

    function renderQuickSearchResults(employees) {
        const container = document.getElementById('messageSearchResults');
        if (!container) return;

        if (employees.length === 0) {
            container.innerHTML = '<div class="p-4 text-center text-gray-500">No employees found</div>';
            container.classList.remove('hidden');
            return;
        }

        let html = '';
        employees.forEach(emp => {
            html += `
                <div onclick="startConversation('${emp.employeeId}')" class="p-3 border-b border-gray-200 hover:bg-gray-50 cursor-pointer">
                    <div class="flex items-center gap-3">
                        <img src="${emp.profilePic || '/uploads/profiles/default-avatar.png'}" class="w-10 h-10 rounded-full" alt="Avatar">
                        <div class="flex-1 min-w-0">
                            <h4 class="font-semibold text-gray-900 truncate">${emp.fullName}</h4>
                            <p class="text-sm text-gray-600 truncate">${emp.employeeId} • ${emp.position || 'Staff'}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
        container.classList.remove('hidden');
    }

    function renderSearchResults(employees) {
        const container = document.getElementById('searchResults');
        
        if (employees.length === 0) {
            container.innerHTML = '<div class="p-4 text-center text-gray-500">No employees found</div>';
            document.getElementById('createGroupBtn').classList.add('hidden');
            return;
        }

        let html = '';
        employees.forEach(emp => {
            html += `
                <div class="p-3 border-b border-gray-100 hover:bg-gray-50">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" value="${emp.employeeId}" class="w-4 h-4 text-[#003D7A] rounded focus:ring-[#003D7A]">
                        <img src="${emp.profilePic || '/uploads/profiles/default-avatar.png'}" class="w-10 h-10 rounded-full" alt="Avatar">
                        <div class="flex-1 cursor-pointer" onclick="startConversation('${emp.employeeId}')">
                            <h4 class="font-semibold text-gray-900">${emp.fullName}</h4>
                            <p class="text-sm text-gray-600">${emp.employeeId} • ${emp.position || 'Staff'}</p>
                        </div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = html;
        
        // Show create group button if multiple results
        if (employees.length > 1) {
            document.getElementById('createGroupBtn').classList.remove('hidden');
        } else {
            document.getElementById('createGroupBtn').classList.add('hidden');
        }
    }

    async function startConversation(employeeId) {
        try {
            const response = await fetch('/api/messaging/conversations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    participants: [currentUserId, employeeId],
                    type: 'direct',
                    createdBy: currentUserId
                })
            });

            const data = await response.json();
            if (data.success) {
                closeNewChatModal();
                await loadConversations();
                openConversation(data.conversation._id);
            }
        } catch (error) {
            console.error('Error starting conversation:', error);
        }
    }

    async function createGroupChat() {
        const selectedEmployees = Array.from(document.querySelectorAll('#searchResults input[type="checkbox"]:checked'))
            .map(cb => cb.value);

        if (selectedEmployees.length < 2) {
            alert('Please select at least 2 employees for a group chat');
            return;
        }

        const groupName = prompt('Enter group name:');
        if (!groupName) return;

        try {
            const response = await fetch('/api/messaging/groups', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: groupName,
                    participants: selectedEmployees,
                    createdBy: currentUserId
                })
            });

            const data = await response.json();
            if (data.success) {
                closeNewChatModal();
                await loadConversations();
                openConversation(data.conversation._id);
            }
        } catch (error) {
            console.error('Error creating group:', error);
        }
    }

    function openImageModal(src) {
        // Simple image modal
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-[70]';
        modal.innerHTML = `
            <div class="relative max-w-4xl max-h-full p-4">
                <img src="${src}" class="max-w-full max-h-full object-contain">
                <button onclick="this.parentElement.parentElement.remove()" class="absolute top-4 right-4 text-white text-2xl">&times;</button>
            </div>
        `;
        document.body.appendChild(modal);
    }

    // Socket.IO for real-time messaging
    socket.on('new-message', async (message) => {
        console.log('📨 Received new message via socket:', message);
        playMessageSound();
        if (message.conversationId === currentConversationId) {
            console.log('📨 Message is for current conversation, reloading messages');
            await loadMessages(currentConversationId);
            if (message.senderId !== currentUserId) {
                await markMessagesAsRead(currentConversationId);
            }
        }
        await loadConversations(); // Update conversation list
    });

    socket.on('messages-read', async ({ conversationId, readerId }) => {
        if (conversationId === currentConversationId) {
            await loadMessages(currentConversationId);
        }
        await loadConversations();
    });

    // Close modals when clicking outside
    document.addEventListener('click', function(e) {
        const messagingModal = document.getElementById('messagingModal');
        const newChatModal = document.getElementById('newChatModal');
        
        if (e.target === messagingModal) {
            toggleMessagingModal();
        }
        if (e.target === newChatModal) {
            closeNewChatModal();
        }
    });

    // Load conversations on page load
    document.addEventListener('DOMContentLoaded', function() {
        currentUserId = localStorage.getItem('employeeId');
        if (currentUserId) {
            loadConversations();
        }
    });
